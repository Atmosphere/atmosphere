<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy is emitted as a server response header on this
      document (see ConsoleResourceFilter / AtmosphereConsoleServlet), NOT a
      static <meta>. The MCP Apps sandbox frames a distinct sibling origin
      (localhost<->127.0.0.1, or the configured mcp-sandbox-origin) that is only
      known at request time, and CSP combines by intersection so a meta CSP
      could never be loosened by the header. The header keeps the same XSS
      hardening (no 'unsafe-inline' scripts for the v-html markdown sinks) while
      widening frame-src to the resolvable sandbox origins.
    -->
    <title>Atmosphere AI Console</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
