<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atmosphere Admin — Workflow Authoring</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         margin: 0; padding: 24px; max-width: 1200px; margin-inline: auto; }
  header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 16px; }
  header h1 { margin: 0; font-size: 1.4rem; }
  header nav a { font-size: 0.9rem; margin-right: 12px; }
  main { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
  .sidebar { border: 1px solid #ddd; border-radius: 6px; padding: 12px; }
  .sidebar h2 { margin-top: 0; font-size: 1rem; }
  .sidebar button { width: 100%; padding: 8px; margin-bottom: 8px; cursor: pointer; }
  .sidebar ul { list-style: none; padding: 0; margin: 0; }
  .sidebar li { padding: 6px 8px; border-radius: 4px; cursor: pointer; }
  .sidebar li:hover { background: rgba(0, 100, 200, 0.1); }
  .sidebar li.active { background: rgba(0, 100, 200, 0.2); font-weight: 600; }
  .editor { border: 1px solid #ddd; border-radius: 6px; padding: 16px; }
  .editor h2 { margin-top: 0; font-size: 1rem; }
  .editor label { display: block; font-size: 0.85rem; font-weight: 600; margin: 12px 0 4px; }
  .editor input, .editor textarea {
    width: 100%; padding: 8px; box-sizing: border-box; font-family: inherit;
    border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem;
  }
  .editor textarea { min-height: 220px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .editor .row { display: flex; gap: 8px; margin-top: 16px; }
  .editor button { padding: 8px 16px; cursor: pointer; }
  .editor button.primary { background: #0066cc; color: white; border: none; border-radius: 4px; }
  .editor button.danger { background: #cc0033; color: white; border: none; border-radius: 4px; }
  .status { font-size: 0.85rem; margin-top: 12px; min-height: 1.2em; }
  .status.error { color: #cc0033; }
  .status.success { color: #006633; }
  .empty { color: #888; font-style: italic; padding: 8px; }
</style>
</head>
<body>
<header>
  <h1>Atmosphere — Workflow Authoring</h1>
  <nav>
    <a href="./">Dashboard</a>
    <a href="./flow.html">Journal Flow</a>
    <a href="./workflow.html" aria-current="page"><strong>Workflows</strong></a>
  </nav>
</header>

<main>
  <aside class="sidebar">
    <h2>Workflows</h2>
    <button id="new-workflow">+ New workflow</button>
    <ul id="workflow-list"><li class="empty">Loading…</li></ul>
  </aside>

  <section class="editor">
    <h2 id="editor-title">Select a workflow</h2>
    <label for="wf-id">ID (immutable; letters, digits, _, -)</label>
    <input id="wf-id" type="text" placeholder="support-bot" disabled>
    <label for="wf-name">Name</label>
    <input id="wf-name" type="text" placeholder="Support Bot" disabled>
    <label for="wf-description">Description</label>
    <input id="wf-description" type="text" placeholder="RAG over docs + escalation" disabled>
    <label for="wf-manifest">Graph (JSON)</label>
    <textarea id="wf-manifest" spellcheck="false" placeholder='{"nodes": [...], "edges": [...]}' disabled></textarea>
    <div class="row">
      <button id="save-btn" class="primary" disabled>Save</button>
      <button id="delete-btn" class="danger" disabled>Delete</button>
    </div>
    <p class="status" id="status"></p>
  </section>
</main>

<script>
  const API = '/api/admin/workflow';
  const els = {
    list: document.getElementById('workflow-list'),
    newBtn: document.getElementById('new-workflow'),
    title: document.getElementById('editor-title'),
    id: document.getElementById('wf-id'),
    name: document.getElementById('wf-name'),
    desc: document.getElementById('wf-description'),
    body: document.getElementById('wf-manifest'),
    save: document.getElementById('save-btn'),
    del: document.getElementById('delete-btn'),
    status: document.getElementById('status'),
  };
  let current = null;
  let loaded = [];

  function setStatus(message, kind) {
    els.status.textContent = message || '';
    els.status.className = 'status' + (kind ? ' ' + kind : '');
  }

  function enableEditor(editing) {
    [els.name, els.desc, els.body, els.save].forEach(e => e.disabled = !editing);
    els.id.disabled = !editing || current?.version > 1; // immutable after first save
    els.del.disabled = !editing || current?.version === 0;
  }

  async function refresh() {
    setStatus('Loading workflows…');
    try {
      const r = await fetch(API);
      if (!r.ok) throw new Error('GET ' + API + ' returned ' + r.status);
      loaded = await r.json();
      renderList(loaded);
      setStatus(loaded.length ? '' : 'No workflows yet — click "New workflow" to author one.');
    } catch (e) {
      setStatus('Failed to load workflows: ' + e.message, 'error');
    }
  }

  function renderList(items) {
    if (!items.length) {
      els.list.innerHTML = '<li class="empty">No workflows yet</li>';
      return;
    }
    els.list.innerHTML = '';
    for (const m of items) {
      const li = document.createElement('li');
      li.textContent = m.name + ' (v' + m.version + ')';
      li.dataset.id = m.id;
      li.addEventListener('click', () => select(m));
      els.list.appendChild(li);
    }
  }

  function select(manifest) {
    current = manifest;
    Array.from(els.list.children).forEach(li =>
        li.classList.toggle('active', li.dataset.id === manifest.id));
    els.title.textContent = 'Editing ' + manifest.name + ' (v' + manifest.version + ')';
    els.id.value = manifest.id;
    els.name.value = manifest.name;
    els.desc.value = manifest.description || '';
    els.body.value = JSON.stringify({nodes: manifest.nodes, edges: manifest.edges}, null, 2);
    enableEditor(true);
    setStatus('');
  }

  function newWorkflow() {
    current = {id: '', name: '', description: '', nodes: [], edges: [], version: 0};
    Array.from(els.list.children).forEach(li => li.classList.remove('active'));
    els.title.textContent = 'New workflow';
    els.id.value = '';
    els.name.value = '';
    els.desc.value = '';
    els.body.value = JSON.stringify({nodes: [
      {id: 'agent-1', type: 'agent', label: 'Agent', config: {agent: 'your-agent-name'}}
    ], edges: []}, null, 2);
    enableEditor(true);
    els.id.disabled = false;
    els.del.disabled = true;
    setStatus('');
    els.id.focus();
  }

  async function save() {
    if (!current) return;
    let body;
    try {
      body = JSON.parse(els.body.value);
    } catch (e) {
      setStatus('Graph JSON is not valid: ' + e.message, 'error');
      return;
    }
    const isNew = current.version === 0;
    const manifest = {
      id: els.id.value.trim(),
      name: els.name.value.trim(),
      description: els.desc.value.trim() || null,
      nodes: body.nodes || [],
      edges: body.edges || [],
      createdBy: current.createdBy || null,
      createdAt: current.createdAt || new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      version: isNew ? 1 : current.version + 1,
    };
    setStatus('Saving…');
    try {
      const r = await fetch(API, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(manifest),
      });
      if (!r.ok) {
        const text = await r.text();
        throw new Error('HTTP ' + r.status + ': ' + text);
      }
      const saved = await r.json();
      setStatus('Saved v' + saved.version, 'success');
      await refresh();
      select(saved);
    } catch (e) {
      setStatus('Save failed: ' + e.message, 'error');
    }
  }

  async function del() {
    if (!current || current.version === 0) return;
    if (!confirm('Delete workflow ' + current.id + '?')) return;
    setStatus('Deleting…');
    try {
      const r = await fetch(API + '/' + encodeURIComponent(current.id), {method: 'DELETE'});
      if (!r.ok) {
        const text = await r.text();
        throw new Error('HTTP ' + r.status + ': ' + text);
      }
      setStatus('Deleted', 'success');
      current = null;
      els.id.value = els.name.value = els.desc.value = els.body.value = '';
      els.title.textContent = 'Select a workflow';
      enableEditor(false);
      await refresh();
    } catch (e) {
      setStatus('Delete failed: ' + e.message, 'error');
    }
  }

  els.newBtn.addEventListener('click', newWorkflow);
  els.save.addEventListener('click', save);
  els.del.addEventListener('click', del);

  enableEditor(false);
  refresh();
</script>
</body>
</html>
