# Gitflow Incremental Builder — default configuration.
# See https://github.com/gitflow-incremental-builder/gitflow-incremental-builder
#
# The pre-push-validate.sh wrapper is the authoritative entry point. GIB is
# disabled by default so that direct `./mvnw install`, `./mvnw deploy`, and CI
# release invocations continue to build the full reactor. The wrapper opts in
# via `-Dgib.disable=false` for incremental pre-push validation.

# Off by default. The wrapper flips this to false (GIB active).
gib.disable=true

# When GIB is active, diff against the trunk branch used for reviews.
gib.baseBranch=refs/remotes/origin/main

# Never trim the reactor when building trunk directly. Redundant with the
# default above but documented for operators who opt in via -Dgib.disable=false
# on a local branch that happens to track main.
gib.disableIfBranchMatches=main|atmosphere-2\\.6\\.x

# Build downstream consumers of any changed module. A change in modules/cpr
# must rebuild every module that depends on it.
gib.buildDownstream=always

# Build upstream dependencies only when required by reactor ordering
# (Maven's default -am semantics).
gib.buildUpstream=derived

# Paths that do not affect the Java/Maven build — changes limited to these
# never trigger a reactor build.
gib.excludePathsMatching=(?:^|.*/)(\\.gitignore|\\.editorconfig|LICENSE|NOTICE|.*\\.md|.*\\.txt|\\.github/.*|docs/.*)

# If no changes remain after filtering, build nothing. The wrapper treats
# this as "docs-only change, skip Maven entirely".
gib.buildAllIfNoChanges=false
