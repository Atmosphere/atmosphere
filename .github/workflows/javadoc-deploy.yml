name: Deploy API Docs

on:
  push:
    branches: [main]
    paths:
      - 'modules/cpr/src/main/java/**'
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  javadoc:
    name: Generate & Deploy Javadoc
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Extract project version
        id: version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compile sources
        run: ./mvnw compile -pl modules/cpr -Pfastinstall -q

      - name: Generate Javadoc
        run: |
          # Build classpath from Maven dependencies
          DEPS_CP=$(./mvnw dependency:build-classpath -pl modules/cpr -Dmdep.outputFile=/dev/stdout -q)

          javadoc -d target/apidocs \
            -sourcepath modules/cpr/src/main/java \
            -classpath "$DEPS_CP" \
            -subpackages org.atmosphere \
            -source 21 \
            -Xdoclint:none \
            -quiet \
            -encoding UTF-8 \
            -windowtitle "Atmosphere ${{ steps.version.outputs.version }} API" \
            -doctitle "Atmosphere Framework ${{ steps.version.outputs.version }} API" \
            -header "Atmosphere ${{ steps.version.outputs.version }}" \
            -bottom "Copyright &copy; 2008-2026 Async-IO.org. All rights reserved." \
            -link "https://docs.oracle.com/en/java/javase/21/docs/api/" \
            -link "https://jakarta.ee/specifications/platform/9/apidocs/"

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy Javadoc to /apidocs/
        run: |
          rm -rf gh-pages/apidocs
          cp -r target/apidocs gh-pages/apidocs

          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apidocs/

          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "docs: update Javadoc API reference"
            git push
          fi
