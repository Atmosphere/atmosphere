name: mirroir-run replay (sample matrix)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'samples/*/SAMPLE.md'
      - 'samples/*/scenarios/**'
      - 'modules/cpr/**'
      - 'modules/spring-boot-starter/**'
      - 'modules/quarkus-extension/**'
      - 'modules/ai/**'
      - '.github/workflows/mirroir-pilot.yml'
  pull_request:
    paths:
      - 'samples/*/SAMPLE.md'
      - 'samples/*/scenarios/**'
      - 'modules/cpr/**'
      - 'modules/spring-boot-starter/**'
      - 'modules/quarkus-extension/**'
      - 'modules/ai/**'
      - '.github/workflows/mirroir-pilot.yml'

concurrency:
  group: mirroir-pilot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  replay:
    name: ${{ matrix.sample }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        sample: [spring-boot-ai-chat, spring-boot-chat, quarkus-chat, quarkus-ai-chat]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Cache Cargo + mirroir-run target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/mirroir-mcp/runner/target
          # Key tied to the pinned mirroir-mcp branch + the runner-fix commit
          # SHA. Bump when the pin changes so prior caches (which may hold the
          # scaffold-only binary from mirroir-mcp/main) cannot satisfy the hit.
          key: mirroir-run-${{ runner.os }}-b3096c2

      - name: Build mirroir-run from source
        run: |
          # Pinned to feature/runner-cli-smoke until the runner branch merges
          # to mirroir-mcp/main; that branch carries the empty-verdict guard
          # and CSS-selector pass-through (mirroir-mcp@3edc89c, b3096c2).
          # We always clone (don't gate on cached binary): the cache restores
          # the build target dir + Cargo registry to speed up the rebuild,
          # but we rebuild from source so the binary always matches the pin.
          rm -rf /tmp/mirroir-mcp
          git clone --depth 1 --branch feature/runner-cli-smoke \
            https://github.com/jfarcand/mirroir-mcp.git /tmp/mirroir-mcp
          (cd /tmp/mirroir-mcp/runner && cargo build --release --bin mirroir-run)
          sudo cp /tmp/mirroir-mcp/runner/target/release/mirroir-run /usr/local/bin/
          mirroir-run --help | head -10

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
          key: playwright-${{ runner.os }}-v1

      - name: Install Playwright (chromium + firefox + webkit)
        run: |
          mkdir -p /tmp/playwright-home
          cd /tmp/playwright-home
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install --with-deps chromium firefox webkit

      - name: Install everything the sample needs (sample + all -am deps)
        run: ./mvnw -B -q install -pl samples/${{ matrix.sample }} -am -DskipTests

      - name: Warm Maven plugins (avoid plugin-download stretch inside boot wait)
        run: ./mvnw -B -q dependency:resolve-plugins -pl samples/${{ matrix.sample }}

      - name: Drive sample through mirroir-run
        env:
          MIRROIR_PLAYWRIGHT_HOME: /tmp/playwright-home
          MIRROIR_REPO_ROOT: ${{ github.workspace }}
          RUST_LOG: info
        run: mirroir-run --sample samples/${{ matrix.sample }} --scenarios must-pass

      - name: Upload mirroir-run + session logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mirroir-run-report-${{ matrix.sample }}-${{ runner.os }}
          path: |
            mirroir-run-report.json
            playwright-report.json
            /tmp/.tmp*/session.log
            /var/folders/*/*/T/.tmp*/session.log
          if-no-files-found: ignore
