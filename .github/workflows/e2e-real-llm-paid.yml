name: "CI: E2E (Real LLM — Paid nightly)"

# Wave 1-6 close-out Tier-2 real-LLM tier. Runs nightly against paid
# OpenAI and Gemini endpoints so regressions in Spring AI / LC4j / Built-in
# bridges are caught against production providers. Structural assertions
# only — no content checks — so the test is stable across model updates.
#
# Cost ceiling: ≤$5 / run. Each matrix job uses a small model and a
# single prompt; total expected spend < $1. Hard 10-minute timeout per
# job to cap runaway costs.
#
# Secrets required: OPENAI_API_KEY, GEMINI_API_KEY
#
# NOT ON THE PER-PUSH GATING PATH — this nightly canary only runs on a
# schedule and on demand, never on push, so a paid-API hiccup (OpenAI/Gemini
# transient 5xx, rate limit, model deprecation) can never block a merge or a
# release. Because it is already off the push path there is no reason to mask
# its result with `continue-on-error` (a red X that doesn't count — a hack):
# when it runs it reports HONESTLY, and a real wire-protocol regression shows
# as a genuine failure to investigate. Not in main's required status checks;
# do not add these jobs to branch protection without asking the maintainer.

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:

concurrency:
  group: e2e-real-llm-paid-${{ github.ref }}
  cancel-in-progress: false

jobs:
  paid-e2e:
    name: Paid ${{ matrix.provider.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository == 'Atmosphere/atmosphere'
    strategy:
      fail-fast: false
      matrix:
        provider:
          # rpm: per-minute request budget for the free/low tier. 0 = unthrottled.
          # Gemini free tier caps generate_content at 5 req/min/model, so throttle
          # to 4 (headroom for the occasional resilient resend). See llm-rate-budget.ts.
          - { name: openai, base_url: 'https://api.openai.com/v1', model: 'gpt-4o-mini', secret: OPENAI_API_KEY, rpm: 0 }
          - { name: gemini, base_url: 'https://generativelanguage.googleapis.com/v1beta/openai', model: 'gemini-2.5-flash', secret: GEMINI_API_KEY, rpm: 4 }
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build reactor (full install, tests skipped)
        run: |
          # Full-reactor install, exactly like ci.yml's boot gate: a scoped
          # -pl ... -am build fails Quarkus's extension dependency
          # verification on a cold ~/.m2 (the deployment artifact resolves
          # in-reactor instead of from the repo). This also provides
          # integration-tests (the Playwright fixture spawns
          # AiFeatureTestServer from it) and every sample the lane boots.
          ./mvnw -B -q install -DskipTests -Dgpg.skip=true

      - name: Package quarkus-ai-chat sample
        run: |
          # The quarkus-ai-chat playwright project drives the packaged
          # quarkus-run.jar. The full-reactor install above already built and
          # installed every dependency; this scoped package just (re)produces
          # target/quarkus-app/quarkus-run.jar for the fixture to boot.
          ./mvnw -q package -pl samples/quarkus-ai-chat -DskipTests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: modules/integration-tests/package-lock.json

      - name: Install Playwright Dependencies
        working-directory: modules/integration-tests
        run: |
          npm ci
          for attempt in 1 2 3; do
            if npx playwright install --with-deps chromium; then break; fi
            [ "$attempt" = "3" ] && exit 1
            sleep "${attempt}0"
          done

      - name: Run real-LLM E2E (${{ matrix.provider.name }})
        working-directory: modules/integration-tests
        env:
          LLM_MODE: real-${{ matrix.provider.name }}
          LLM_BASE_URL: ${{ matrix.provider.base_url }}
          LLM_MODEL: ${{ matrix.provider.model }}
          LLM_API_KEY: ${{ secrets[matrix.provider.secret] }}
          # Shared across BOTH run steps of this leg so the file-backed rolling
          # window spans them (they are separate processes hitting one quota).
          LLM_RPM: ${{ matrix.provider.rpm }}
          LLM_BUDGET_FILE: ${{ runner.temp }}/llm-budget-${{ matrix.provider.name }}.jsonl
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "${{ matrix.provider.secret }} secret not set — skipping" >&2
            exit 0
          fi
          npx playwright test --project=real-llm-chat --reporter=list

      - name: Run quarkus-ai-chat real-LLM E2E (${{ matrix.provider.name }})
        working-directory: modules/integration-tests
        env:
          LLM_MODE: real-${{ matrix.provider.name }}
          LLM_BASE_URL: ${{ matrix.provider.base_url }}
          LLM_MODEL: ${{ matrix.provider.model }}
          LLM_API_KEY: ${{ secrets[matrix.provider.secret] }}
          # Shared across BOTH run steps of this leg so the file-backed rolling
          # window spans them (they are separate processes hitting one quota).
          LLM_RPM: ${{ matrix.provider.rpm }}
          LLM_BUDGET_FILE: ${{ runner.temp }}/llm-budget-${{ matrix.provider.name }}.jsonl
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "${{ matrix.provider.secret }} secret not set — skipping" >&2
            exit 0
          fi
          npx playwright test --project=quarkus-ai-chat --reporter=list

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: paid-llm-${{ matrix.provider.name }}
          path: |
            modules/integration-tests/test-results/
            modules/integration-tests/playwright-report/
          retention-days: 14
