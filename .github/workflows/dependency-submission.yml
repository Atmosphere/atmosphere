name: "CI: Dependency Graph"

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-submission:
    name: Submit Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          # Supply-chain hardening: GPG-verify the JDK archive before install
          # (setup-java >= v5.5.0, Temurin-supported). Piloted on this lane
          # before fanning out to the other setup-java steps.
          verify-signature: true
          cache: 'maven'

      - name: Build reactor (install SNAPSHOTs locally)
        run: ./mvnw install -DskipTests -Pfastinstall -q

      - name: Submit dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5
