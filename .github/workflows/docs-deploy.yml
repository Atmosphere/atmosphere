name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy Starlight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build Starlight
        working-directory: docs
        run: npm run build

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy docs to /docs/ subdirectory
        run: |
          # Remove old docs directory (if any) but preserve everything else
          rm -rf gh-pages/docs

          # Copy Starlight build output to /docs/
          cp -r docs/dist gh-pages/docs

          # Commit and push
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "docs: deploy Starlight tutorial"
            git push
          fi
