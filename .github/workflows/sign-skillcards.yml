# Signs every modules/<X>/SKILLCARD.yaml using OpenSSF Model Signing
# (model_signing) with Sigstore keyless OIDC — short-lived cert from
# Fulcio + transparency-log entry in Rekor. The resulting .sig files
# match the format consumed by NVIDIA's verified-skills programme and
# any other OMS-compliant verifier.
#
# Trigger model:
#   - Tag pushes matching v* (release path) — sigs are uploaded as a
#     release asset and as a workflow artifact for the existing Maven
#     publish job to bundle into jars.
#   - workflow_dispatch — manual signing run for verification / dry-run.
#
# Why a separate workflow vs. folding into the main CI:
# signing requires `id-token: write`, which we deliberately scope to
# this one workflow so the broader build pipeline keeps its current
# permission posture (Correctness Invariant #6 — Security, every
# mutating surface requires explicit authorization).
name: Sign Skill Cards

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this manual run? (e.g. validating workflow, ad-hoc sig)'
        required: false
        default: 'manual verification'

permissions:
  id-token: write   # required for Sigstore keyless OIDC via Fulcio
  contents: read

jobs:
  sign:
    name: Sign all SKILLCARD.yaml via OMS / Sigstore keyless
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install model-signing
        run: |
          python -m pip install --upgrade pip
          python -m pip install model-signing==1.1.1

      - name: Verify SKILLCARD freshness before signing
        run: ./scripts/regen-skillcards.sh --check

      - name: Pre-publish SkillSpector scan (HIGH-severity gate)
        run: ./scripts/scan-skillcards.sh --check

      - name: Fetch Sigstore OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            // Request a GitHub OIDC token scoped to the sigstore audience
            // so model_signing's keyless plugin can present it to Fulcio
            // for a short-lived signing cert. The token is masked in
            // logs (setSecret) so it never appears in output.
            const token = await core.getIDToken('sigstore');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Sign every SKILLCARD.yaml (sigstore keyless)
        env:
          SIGSTORE_IDENTITY_TOKEN: ${{ steps.oidc.outputs.token }}
        run: ./scripts/sign-skillcards.sh

      - name: Verify signatures round-trip
        # Self-verify what we just signed — sanity gate. The identity
        # is the workflow's OIDC subject; we don't pin a specific
        # identity here because downstream consumers will choose their
        # own pin (e.g. workflow path under Atmosphere/atmosphere).
        run: |
          for sig in modules/*/SKILLCARD.yaml.sig; do
            card="${sig%.sig}"
            python -m model_signing verify sigstore \
              --signature "$sig" \
              --identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/sign-skillcards.yml@${GITHUB_REF}" \
              --identity_provider "https://token.actions.githubusercontent.com" \
              "$card"
          done

      - name: Upload signatures as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillcard-signatures
          path: modules/*/SKILLCARD.yaml.sig
          retention-days: 90

      - name: Attach signatures to GitHub release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: modules/*/SKILLCARD.yaml.sig
          fail_on_unmatched_files: true
