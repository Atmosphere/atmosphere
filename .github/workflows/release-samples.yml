name: Release Sample JARs

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-sample-jars:
    name: Build ${{ matrix.sample }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        sample:
          - spring-boot-chat
          - spring-boot-ai-chat
          - spring-boot-ai-classroom
          - spring-boot-ai-tools
          - spring-boot-adk-chat
          - spring-boot-adk-tools
          - spring-boot-langchain4j-chat
          - spring-boot-langchain4j-tools
          - spring-boot-embabel-chat
          - spring-boot-embabel-horoscope
          - spring-boot-spring-ai-chat
          - spring-boot-spring-ai-routing
          - spring-boot-rag-chat
          - spring-boot-mcp-server
          - spring-boot-otel-chat
          - spring-boot-durable-sessions
          - embedded-jetty-websocket-chat
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'

    - name: Install Atmosphere Modules
      run: ./mvnw -B install -DskipTests -Dgpg.skip=true -Pfastinstall

    - name: Build Sample Fat JAR
      run: ./mvnw -B package -DskipTests -Dgpg.skip=true -pl samples/${{ matrix.sample }}

    - name: Prepare Release Asset
      id: prepare
      run: |
        version="${GITHUB_REF_NAME#v}"
        sample="${{ matrix.sample }}"

        # Find the fat JAR (Spring Boot repackaged or Quarkus runner)
        if [ "$sample" = "quarkus-chat" ]; then
          jar=$(find samples/$sample/target -name "*-runner.jar" | head -1)
          asset_name="${sample}-${version}-runner.jar"
        else
          # Spring Boot fat JAR (the one without -original suffix)
          jar=$(find samples/$sample/target -maxdepth 1 -name "*.jar" ! -name "*-original*" ! -name "*-sources*" | head -1)
          asset_name="${sample}-${version}.jar"
        fi

        if [ -z "$jar" ] || [ ! -f "$jar" ]; then
          echo "No JAR found for $sample"
          ls -la samples/$sample/target/
          exit 1
        fi

        cp "$jar" "$asset_name"
        echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"
        echo "asset_path=$asset_name" >> "$GITHUB_OUTPUT"

        size=$(du -h "$asset_name" | cut -f1)
        echo "Built $asset_name ($size)"

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.prepare.outputs.asset_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-quarkus-jar:
    name: Build quarkus-chat
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'

    - name: Install Atmosphere Modules
      run: ./mvnw -B install -DskipTests -Dgpg.skip=true -Pfastinstall

    - name: Build Quarkus Sample
      run: ./mvnw -B package -DskipTests -Dgpg.skip=true -pl samples/quarkus-chat

    - name: Prepare Release Asset
      id: prepare
      run: |
        version="${GITHUB_REF_NAME#v}"

        # Quarkus produces a runner JAR and lib/ directory — zip them together
        cd samples/quarkus-chat/target
        mkdir -p quarkus-chat
        cp quarkus-app/quarkus-run.jar quarkus-chat/ 2>/dev/null || cp *-runner.jar quarkus-chat/ 2>/dev/null || true
        cp -r quarkus-app/lib quarkus-chat/ 2>/dev/null || true
        cp -r quarkus-app/app quarkus-chat/ 2>/dev/null || true
        cp -r quarkus-app/quarkus quarkus-chat/ 2>/dev/null || true
        cd ..

        asset_name="quarkus-chat-${version}.zip"
        cd target && zip -r "../../$asset_name" quarkus-chat/ && cd ../..

        echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"
        echo "asset_path=$asset_name" >> "$GITHUB_OUTPUT"

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.prepare.outputs.asset_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-cli-version:
    name: Update CLI version
    runs-on: ubuntu-latest
    needs: [build-sample-jars, build-quarkus-jar]

    steps:
    - uses: actions/checkout@v4

    - name: Update version in CLI files
      run: |
        version="${GITHUB_REF_NAME#v}"

        # Update samples.json version
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$version\"/" cli/samples.json

        # Update atmosphere CLI version
        sed -i "s/^VERSION=\"[^\"]*\"/VERSION=\"$version\"/" cli/atmosphere

        # Update install.sh version
        sed -i "s/^VERSION=\"[^\"]*\"/VERSION=\"$version\"/" cli/install.sh

        # Update npx package version
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$version\"/" cli/npx/package.json

    - name: Create PR for version bump
      uses: peter-evans/create-pull-request@v7
      with:
        commit-message: "chore(cli): bump version to ${{ github.ref_name }}"
        title: "chore(cli): bump CLI version to ${{ github.ref_name }}"
        branch: cli-version-bump-${{ github.ref_name }}
        body: "Automated version bump after release ${{ github.ref_name }}"
