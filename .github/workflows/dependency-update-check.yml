name: AI Dependency Update Check

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-ai-dependencies:
    name: Check AI Framework Dependencies
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check and update dependencies
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        # ──────────────────────────────────────────────────────────
        # Dependency registry
        # Format: "Name|groupId|artifactId|propertyName|file1|file2|..."
        # To add a dependency, append a line.
        # ──────────────────────────────────────────────────────────
        # All versions are declared once in the root pom.xml.
        # Format: "Name|groupId|artifactId|propertyName"
        DEPS=(
          "Spring AI|org.springframework.ai|spring-ai-client-chat|spring-ai.version"
          "Embabel|com.embabel.agent|embabel-agent-api|embabel.version"
          "Google ADK|com.google.adk|google-adk|google-adk.version"
          "Koog|ai.koog|koog-agents-jvm|koog.version"
          "LangChain4j|dev.langchain4j|langchain4j-core|langchain4j.version"
        )
        ROOT_POM="pom.xml"

        BRANCH="deps/ai-framework-updates"
        TABLE_HEADER="| Framework | Current | Latest | Status |\n|-----------|---------|--------|--------|"
        TABLE_ROWS=""
        HAS_UPDATES=false
        UPDATED_NAMES=""

        for dep in "${DEPS[@]}"; do
          IFS='|' read -ra P <<< "$dep"
          NAME="${P[0]}"
          GROUP="${P[1]}"
          ARTIFACT="${P[2]}"
          PROP="${P[3]}"

          CURRENT=$(grep -oP "<${PROP}>\K[^<]+" "$ROOT_POM" 2>/dev/null || true)

          if [ -z "$CURRENT" ]; then
            TABLE_ROWS="${TABLE_ROWS}\n| ${NAME} | ? | - | Could not read version |"
            continue
          fi

          # Query Maven Central
          LATEST=$(curl -sf --retry 3 --retry-delay 5 \
            "https://search.maven.org/solrsearch/select?q=g:\"${GROUP}\"+AND+a:\"${ARTIFACT}\"&rows=1&wt=json" \
            | jq -r '.response.docs[0].latestVersion // empty' 2>/dev/null || true)

          if [ -z "$LATEST" ]; then
            TABLE_ROWS="${TABLE_ROWS}\n| ${NAME} | \`${CURRENT}\` | - | Not on Maven Central |"
            continue
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            TABLE_ROWS="${TABLE_ROWS}\n| ${NAME} | \`${CURRENT}\` | \`${LATEST}\` | Up to date |"
            continue
          fi

          echo "${NAME}: ${CURRENT} -> ${LATEST}"
          HAS_UPDATES=true
          UPDATED_NAMES="${UPDATED_NAMES:+${UPDATED_NAMES}, }${NAME}"
          sed -i "s|<${PROP}>[^<]*</${PROP}>|<${PROP}>${LATEST}</${PROP}>|g" "$ROOT_POM"

          TABLE_ROWS="${TABLE_ROWS}\n| ${NAME} | \`${CURRENT}\` | **\`${LATEST}\`** | Updated |"
        done

        if [ "$HAS_UPDATES" != "true" ]; then
          echo "All AI dependencies are up to date."
          exit 0
        fi

        # Close stale PR on same branch if one exists
        EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' || true)
        [ -n "$EXISTING_PR" ] && gh pr close "$EXISTING_PR" --delete-branch 2>/dev/null || true

        # Create branch, commit, push
        git checkout -B "$BRANCH"
        git add -A
        git commit -m "chore(deps): update AI framework versions (${UPDATED_NAMES})"
        git push -u origin "$BRANCH" --force-with-lease

        TABLE=$(echo -e "${TABLE_HEADER}\n${TABLE_ROWS}")

        gh pr create \
          --title "chore(deps): update AI framework versions (${UPDATED_NAMES})" \
          --body "$(cat <<EOF
        ## AI Framework Dependency Updates

        Automated check found newer versions on [Maven Central](https://search.maven.org/).

        ${TABLE}

        **Updated:** ${UPDATED_NAMES}

        ### Review checklist
        - [ ] Check release notes for breaking API changes
        - [ ] Run \`./mvnw compile\` to verify compilation
        - [ ] Run \`./mvnw test\` for affected modules
        - [ ] Verify sample applications still compile
        EOF
        )" \
          --label "dependencies" \
          --base main
