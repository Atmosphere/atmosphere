name: CLI E2E — Sample Build Matrix

on:
  push:
    paths:
      - 'cli/**'
      - 'samples/**'
      - 'e2e-tests/**'
      - '.github/workflows/cli-e2e.yml'
    branches: [main]
  pull_request:
    paths:
      - 'cli/**'
      - 'samples/**'
      - 'e2e-tests/**'
      - '.github/workflows/cli-e2e.yml'
  workflow_dispatch:

env:
  MAVEN_OPTS: '-Xmx2g'

jobs:
  # ─────────────────────────────────────────────
  # Quick: CLI unit tests (no Java needed)
  # ─────────────────────────────────────────────
  cli-tests:
    name: CLI unit tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install jq
      run: sudo apt-get install -y jq

    - name: Run CLI test suite
      run: sh cli/test-cli.sh

  # ─────────────────────────────────────────────
  # Build every runnable sample from source
  # ─────────────────────────────────────────────
  build-sample:
    name: Build ${{ matrix.sample }}
    runs-on: ubuntu-latest
    needs: [cli-tests]

    strategy:
      matrix:
        sample:
          - spring-boot-chat
          - spring-boot-ai-chat
          - spring-boot-ai-classroom
          - spring-boot-ai-tools
          - spring-boot-adk-chat
          - spring-boot-adk-tools
          - spring-boot-langchain4j-chat
          - spring-boot-langchain4j-tools
          - spring-boot-embabel-chat
          - spring-boot-embabel-horoscope
          - spring-boot-spring-ai-chat
          - spring-boot-spring-ai-routing
          - spring-boot-rag-chat
          - spring-boot-mcp-server
          - spring-boot-otel-chat
          - spring-boot-durable-sessions
          - quarkus-chat
          - embedded-jetty-websocket-chat
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'

    - name: Install Atmosphere modules locally
      run: ./mvnw -B install -DskipTests -Dgpg.skip=true -Pfastinstall

    - name: Build sample as standalone (patched POM)
      run: |
        sample="${{ matrix.sample }}"

        # Simulate what the CLI does: patch relativePath for standalone build
        sed -i 's|<relativePath>../../pom.xml</relativePath>|<relativePath/>|' \
          "samples/$sample/pom.xml"

        # Build the sample (skip checkstyle/pmd — config files not available standalone)
        cd "samples/$sample"
        ../../mvnw package -DskipTests -Dcheckstyle.skip=true -Dpmd.skip=true -B

    - name: Verify JAR exists
      run: |
        sample="${{ matrix.sample }}"
        if [ "$sample" = "quarkus-chat" ]; then
          ls samples/$sample/target/quarkus-app/quarkus-run.jar
        else
          jar=$(find samples/$sample/target -maxdepth 1 \
            -name "*.jar" ! -name "*-original*" ! -name "*-sources*" ! -name "*-javadoc*" \
            | head -1)
          [ -n "$jar" ] && [ -f "$jar" ] || {
            echo "No JAR found!"
            ls -la samples/$sample/target/
            exit 1
          }
          echo "Built: $jar ($(du -h "$jar" | cut -f1))"
        fi

  # ─────────────────────────────────────────────
  # Playwright E2E: run real browser tests against
  # the CLI-built JARs for samples that have specs
  # ─────────────────────────────────────────────
  e2e-playwright:
    name: E2E ${{ matrix.e2e-name }}
    runs-on: ubuntu-latest
    needs: [cli-tests]

    strategy:
      matrix:
        include:
          - sample: spring-boot-chat
            e2e-name: spring-boot-chat
            port: 8080
          - sample: embedded-jetty-websocket-chat
            e2e-name: embedded-jetty-chat
            port: 8080
          - sample: quarkus-chat
            e2e-name: quarkus-chat
            port: 8080
          - sample: spring-boot-mcp-server
            e2e-name: mcp-server
            port: 8080
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'

    - name: Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Atmosphere modules locally
      run: ./mvnw -B install -DskipTests -Dgpg.skip=true -Pfastinstall

    - name: Build sample JAR
      run: |
        sample="${{ matrix.sample }}"
        cd "samples/$sample"
        ../../mvnw package -DskipTests -Dcheckstyle.skip=true -Dpmd.skip=true -B

    - name: Find JAR path
      id: jar
      run: |
        sample="${{ matrix.sample }}"
        if [ "$sample" = "quarkus-chat" ]; then
          echo "path=samples/$sample/target/quarkus-app/quarkus-run.jar" >> "$GITHUB_OUTPUT"
        else
          jar=$(find samples/$sample/target -maxdepth 1 \
            -name "*.jar" ! -name "*-original*" ! -name "*-sources*" ! -name "*-javadoc*" \
            | head -1)
          echo "path=$jar" >> "$GITHUB_OUTPUT"
        fi

    - name: Start sample app
      run: |
        java -jar "${{ steps.jar.outputs.path }}" &
        # Wait for the app to start
        for i in $(seq 1 60); do
          if curl -s -o /dev/null http://localhost:${{ matrix.port }} 2>/dev/null; then
            echo "App started after ${i}s"
            exit 0
          fi
          sleep 1
        done
        echo "App failed to start"
        exit 1

    - name: Install Playwright
      working-directory: e2e-tests
      run: |
        npm ci
        npx playwright install --with-deps chromium

    - name: Run Playwright E2E tests
      working-directory: e2e-tests
      run: npx playwright test --project="${{ matrix.e2e-name }}"
      env:
        CI: ''  # unset so Playwright reuses the already-running JAR

    - name: Upload Playwright report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.e2e-name }}
        path: e2e-tests/playwright-report/
