name: CLI E2E — Sample Build Matrix

on:
  push:
    paths:
      - 'cli/**'
      - 'samples/**'
      - 'e2e-tests/**'
      - '.github/workflows/cli-e2e.yml'
    branches: [main]
  pull_request:
    paths:
      - 'cli/**'
      - 'samples/**'
      - 'e2e-tests/**'
      - '.github/workflows/cli-e2e.yml'
  workflow_dispatch:

env:
  MAVEN_OPTS: '-Xmx2g'

jobs:
  # ─────────────────────────────────────────────
  # Quick: CLI unit tests (no Java needed)
  # ─────────────────────────────────────────────
  cli-tests:
    name: CLI unit tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install jq
      run: sudo apt-get install -y jq

    - name: Run CLI test suite
      run: sh cli/test-cli.sh

  # ─────────────────────────────────────────────
  # Playwright E2E: build JAR + run browser tests
  # for every sample that has e2e specs
  # ─────────────────────────────────────────────
  e2e-playwright:
    name: E2E ${{ matrix.e2e-name }}
    runs-on: ubuntu-latest
    needs: [cli-tests]

    strategy:
      matrix:
        include:
          # --- Broadcast chat samples ---
          - sample: embedded-jetty-websocket-chat
            e2e-name: embedded-jetty-chat
            port: 8080
            start-type: jetty
          - sample: spring-boot-chat
            e2e-name: spring-boot-chat
            port: 8081
            start-type: spring-boot
          - sample: quarkus-chat
            e2e-name: quarkus-chat
            port: 8082
            start-type: quarkus
          - sample: spring-boot-mcp-server
            e2e-name: mcp-server
            port: 8085
            start-type: spring-boot
          - sample: spring-boot-otel-chat
            e2e-name: otel-chat
            port: 8096
            start-type: spring-boot

          # --- AI streaming chat samples ---
          - sample: spring-boot-ai-chat
            e2e-name: ai-chat
            port: 8083
            start-type: spring-boot
          - sample: spring-boot-ai-classroom
            e2e-name: ai-classroom
            port: 8084
            start-type: spring-boot
          - sample: spring-boot-ai-tools
            e2e-name: ai-tools
            port: 8086
            start-type: spring-boot
          - sample: spring-boot-adk-chat
            e2e-name: adk-chat
            port: 8087
            start-type: spring-boot
          - sample: spring-boot-adk-tools
            e2e-name: adk-tools
            port: 8088
            start-type: spring-boot
          - sample: spring-boot-langchain4j-chat
            e2e-name: langchain4j-chat
            port: 8089
            start-type: spring-boot
          - sample: spring-boot-langchain4j-tools
            e2e-name: langchain4j-tools
            port: 8090
            start-type: spring-boot
          - sample: spring-boot-embabel-chat
            e2e-name: embabel-chat
            port: 8091
            start-type: spring-boot
          - sample: spring-boot-embabel-horoscope
            e2e-name: embabel-horoscope
            port: 8092
            start-type: spring-boot
          - sample: spring-boot-spring-ai-chat
            e2e-name: spring-ai-chat
            port: 8093
            start-type: spring-boot
          - sample: spring-boot-spring-ai-routing
            e2e-name: spring-ai-routing
            port: 8094
            start-type: spring-boot
          - sample: spring-boot-rag-chat
            e2e-name: rag-chat
            port: 8095
            start-type: spring-boot
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'

    - name: Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Atmosphere modules locally
      run: ./mvnw -B install -DskipTests -Dgpg.skip=true -Pfastinstall

    - name: Build sample JAR
      run: |
        sample="${{ matrix.sample }}"
        cd "samples/$sample"
        ../../mvnw package -DskipTests -Dcheckstyle.skip=true -Dpmd.skip=true -B

    - name: Find JAR path
      id: jar
      run: |
        sample="${{ matrix.sample }}"
        if [ "$sample" = "quarkus-chat" ]; then
          echo "path=samples/$sample/target/quarkus-app/quarkus-run.jar" >> "$GITHUB_OUTPUT"
        else
          jar=$(find samples/$sample/target -maxdepth 1 \
            -name "*.jar" ! -name "*-original*" ! -name "*-sources*" ! -name "*-javadoc*" \
            | head -1)
          echo "path=$jar" >> "$GITHUB_OUTPUT"
        fi

    - name: Start sample app
      run: |
        port="${{ matrix.port }}"
        start_type="${{ matrix.start-type }}"

        case "$start_type" in
          spring-boot)
            java -jar "${{ steps.jar.outputs.path }}" --server.port="$port" &
            ;;
          quarkus)
            java -Dquarkus.http.port="$port" -jar "${{ steps.jar.outputs.path }}" &
            ;;
          jetty)
            java -Dserver.port="$port" -jar "${{ steps.jar.outputs.path }}" &
            ;;
        esac

        # Wait for the app to start
        for i in $(seq 1 90); do
          if curl -s -o /dev/null "http://localhost:$port" 2>/dev/null; then
            echo "App started after ${i}s"
            exit 0
          fi
          sleep 1
        done
        echo "App failed to start within 90s"
        exit 1

    - name: Install Playwright
      working-directory: e2e-tests
      run: |
        npm ci
        npx playwright install --with-deps chromium

    - name: Run Playwright E2E tests
      working-directory: e2e-tests
      run: npx playwright test --project="${{ matrix.e2e-name }}"
      env:
        CI: ''  # unset so Playwright reuses the already-running JAR

    - name: Upload Playwright report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.e2e-name }}
        path: e2e-tests/playwright-report/
