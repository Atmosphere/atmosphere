name: CLI Tests

on:
  push:
    paths:
      - 'cli/**'
      - '.github/workflows/cli-e2e.yml'
    branches: [main]
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli-e2e.yml'
  workflow_dispatch:

jobs:
  cli-tests:
    name: CLI unit tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install jq
      run: sudo apt-get install -y jq

    - name: Run CLI test suite
      run: sh cli/test-cli.sh
