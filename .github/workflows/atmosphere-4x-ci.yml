name: Atmosphere CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  architectural-validation:
    name: Architectural Validation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run Architectural Validation
      run: ./scripts/architectural-validation.sh

  doc-version-check:
    name: Documentation Version Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Verify doc versions are consistent
      run: |
        # Extract POM version
        POM_VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
        echo "POM version: $POM_VERSION"

        if [[ "$POM_VERSION" == *-SNAPSHOT ]]; then
          # During dev, docs should reference the last release
          BASE="${POM_VERSION%-SNAPSHOT}"
          IFS='.' read -r MAJ MIN PATCH <<< "$BASE"
          EXPECTED="$MAJ.$MIN.$((PATCH - 1))"
        else
          EXPECTED="$POM_VERSION"
        fi

        echo "Expected doc version: $EXPECTED"

        # Check all doc/README version references
        STALE=$(grep -rn '<version>[0-9]' docs/ modules/*/README.md README.md generator/AtmosphereInit.java 2>/dev/null \
          | grep -v "$EXPECTED" \
          | grep -v 'CHANGELOG\|target/\|node_modules' || true)

        if [ -n "$STALE" ]; then
          echo "::warning::Documentation version drift detected (expected $EXPECTED):"
          echo "$STALE"
          echo ""
          echo "Fix with: ./scripts/update-doc-versions.sh $EXPECTED"
        else
          echo "All documentation references match $EXPECTED"
        fi

  build-and-test:
    name: Build & Test (JDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    needs: architectural-validation

    strategy:
      matrix:
        include:
          - java-version: 21
            distribution: temurin
          - java-version: 23
            distribution: temurin
          - java-version: 25
            distribution: temurin
          - java-version: 26
            distribution: oracle
            # PMD's ASM does not yet support class file major version 70 (JDK 26)
            mvn-extra-args: -Dpmd.skip=true
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: ${{ matrix.distribution }}
        cache: 'maven'

    - name: Build Core Modules
      run: ./mvnw -B clean install -DskipTests -Dgpg.skip=true ${{ matrix.mvn-extra-args }}

    - name: Run Core Tests
      run: ./mvnw -B test -Dgpg.skip=true ${{ matrix.mvn-extra-args }} -pl modules/cpr,modules/ai,modules/mcp,modules/kotlin,modules/spring-ai,modules/langchain4j,modules/embabel,modules/redis,modules/kafka,modules/durable-sessions,modules/durable-sessions-sqlite,modules/durable-sessions-redis,modules/integration-tests,modules/quarkus-extension,modules/spring-boot-starter

    - name: Upload Test Results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-jdk-${{ matrix.java-version }}
        path: |
          **/target/surefire-reports/
          **/target/failsafe-reports/

  e2e-tests:
    name: E2E — ${{ matrix.group.name }}
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      matrix:
        group:
          - name: core-transports
            projects: "chat,spring-boot-chat,multi-client,embedded-jetty-chat,quarkus-chat,sse-transport,long-polling-transport,transport-fallback,reconnection"
          - name: ai-chat
            projects: "ai-chat,ai-streaming-dom,ai-chat-features,ai-memory,ai-memory-strategies,ai-identity,ai-error-recovery,ai-events,unified-console"
          - name: ai-tools-adapters
            projects: "ai-tools,langchain4j-chat,langchain4j-tools,adk-chat,adk-tools,spring-ai-chat,spring-ai-routing,ai-session-stats"
          - name: ai-advanced
            projects: "embabel-chat,embabel-horoscope,rag-chat,ai-filters,ai-fanout,ai-cache,ai-budget,ai-cost-routing,ai-cache-coalescing,ai-combined-cost-cache,ai-routing,ai-classroom,spring-boot-ai-classroom"
          - name: protocols
            projects: "mcp-server,mcp-tools,a2a-agent,agui-chat,grpc-browser,rooms-api,room-typing-direct"
          - name: resilience
            projects: "durable-sessions,durable-session-token,durable-session-identity,otel-chat,chat-observability,offline-queue,history-cache,xss-protection,auth-rejection,auth-token"
          - name: stress
            projects: "message-ordering,large-payload,slow-consumer,connection-timeout"
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: modules/integration-tests/package-lock.json

    - name: Build All Modules
      run: ./mvnw -B clean install -DskipTests -Dgpg.skip=true

    - name: Install Playwright Dependencies
      working-directory: modules/integration-tests
      run: |
        npm ci
        npx playwright install --with-deps chromium

    - name: Run E2E Tests
      working-directory: modules/integration-tests
      run: npx playwright test --project=${{ matrix.group.projects }}

    - name: Upload Playwright Report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.group.name }}
        path: modules/integration-tests/playwright-report/
        retention-days: 14
