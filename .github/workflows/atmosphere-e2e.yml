name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'

    - name: Build All Modules
      run: ./mvnw -B clean install -DskipTests -Dgpg.skip=true

    - name: Package build output
      run: |
        tar czf /tmp/build-targets.tar.gz \
          samples/*/target \
          modules/*/target \
          -C "$HOME" .m2/repository/org/atmosphere

    - name: Upload build output
      uses: actions/upload-artifact@v4
      with:
        name: build-targets
        path: /tmp/build-targets.tar.gz
        retention-days: 1

  e2e:
    name: E2E — ${{ matrix.group.name }}
    runs-on: ubuntu-latest
    needs: [build]

    strategy:
      matrix:
        group:
          - name: core-transports
            projects: "chat,spring-boot-chat,multi-client,embedded-jetty-chat,quarkus-chat,sse-transport,long-polling-transport,transport-fallback,reconnection"
          - name: ai-chat
            projects: "ai-chat,ai-streaming-dom,ai-chat-features,ai-memory,ai-memory-strategies,ai-identity,ai-error-recovery,ai-events,unified-console"
          - name: ai-tools-adapters
            projects: "ai-tools,spring-ai-routing,ai-session-stats"
          - name: ai-advanced
            projects: "rag-chat,ai-filters,ai-fanout,ai-cache,ai-budget,ai-cost-routing,ai-cache-coalescing,ai-combined-cost-cache,ai-routing,ai-classroom,spring-boot-ai-classroom"
          - name: protocols
            projects: "mcp-server,mcp-tools,a2a-agent,agui-chat,multi-agent-startup-team,grpc-browser,rooms-api,room-typing-direct"
          - name: resilience
            projects: "durable-sessions,durable-session-token,durable-session-identity,otel-chat,chat-observability,offline-queue,history-cache,xss-protection,auth-rejection,auth-token"
          - name: stress
            projects: "message-ordering,large-payload,slow-consumer,connection-timeout"
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'

    - name: Download build output
      uses: actions/download-artifact@v4
      with:
        name: build-targets

    - name: Restore build output
      run: |
        tar xzmf build-targets.tar.gz
        # Restore atmosphere SNAPSHOT artifacts to local Maven repo
        if [ -d .m2/repository/org/atmosphere ]; then
          mkdir -p ~/.m2/repository/org
          cp -r .m2/repository/org/atmosphere ~/.m2/repository/org/
          rm -rf .m2
        fi

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: modules/integration-tests/package-lock.json

    - name: Install Playwright Dependencies
      working-directory: modules/integration-tests
      run: |
        npm ci
        npx playwright install --with-deps chromium

    - name: Run E2E Tests
      working-directory: modules/integration-tests
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        PROJECTS=$(echo "${{ matrix.group.projects }}" | sed 's/,/ --project=/g')
        npx playwright test --project=$PROJECTS

    - name: Upload Playwright Report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.group.name }}
        path: modules/integration-tests/playwright-report/
        retention-days: 14
