name: "Release: Maven Central"

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 4.0.0, 4.0.0-RC1)'
        required: true
        type: string
      next_dev_version:
        description: 'Next development version (e.g., 4.0.1-SNAPSHOT)'
        required: true
        type: string
      publish_js:
        description: 'Also publish atmosphere.js to NPM?'
        required: true
        type: boolean
        default: true
      dry_run:
        description: 'Dry run — build and verify without publishing'
        required: true
        type: boolean
        default: false

env:
  MAVEN_OPTS: '-Xmx2g'

jobs:
  # ─────────────────────────────────────────────
  # Phase 1: Validate inputs and run full test suite
  # ─────────────────────────────────────────────
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0

    - name: Validate version format
      run: |
        if ! echo "${{ inputs.release_version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
          echo "::error::Invalid release version format: ${{ inputs.release_version }}"
          exit 1
        fi
        if ! echo "${{ inputs.next_dev_version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-SNAPSHOT$'; then
          echo "::error::Next dev version must end with -SNAPSHOT: ${{ inputs.next_dev_version }}"
          exit 1
        fi

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'

    - name: Install all modules (skip tests)
      run: ./mvnw -B clean install -DskipTests -Dgpg.skip=true

    - name: Run tests
      run: ./mvnw -B test -Dgpg.skip=true -Dgroups='!flaky'

  # ─────────────────────────────────────────────
  # Phase 2: Build atmosphere.js
  # ─────────────────────────────────────────────
  build-js:
    name: Build atmosphere.js
    runs-on: ubuntu-latest
    if: inputs.publish_js
    steps:
    - uses: actions/checkout@v6
      with:
        ref: main

    - name: Setup Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        cache-dependency-path: atmosphere.js/package-lock.json

    - name: Install, test, and build
      working-directory: atmosphere.js
      run: |
        npm ci
        npm run test:ci
        npm run build

    - name: Upload JS dist
      uses: actions/upload-artifact@v7
      with:
        name: atmosphere-js-dist
        path: atmosphere.js/dist/
        retention-days: 1

  # ─────────────────────────────────────────────
  # Phase 3: Release Maven artifacts to Central
  # ─────────────────────────────────────────────
  release-maven:
    name: Release to Maven Central
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0
        token: ${{ secrets.RELEASE_TOKEN || github.token }}

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'
        server-id: central
        server-username: CENTRAL_USERNAME
        server-password: CENTRAL_PASSWORD
        gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
        gpg-passphrase: GPG_PASSPHRASE

    - name: Configure Git
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

    - name: Set release version
      run: |
        ./mvnw -B versions:set -DnewVersion=${{ inputs.release_version }} -DgenerateBackupPoms=false

    - name: Update documentation versions
      run: ./scripts/update-doc-versions.sh ${{ inputs.release_version }}

    - name: Build and stage artifacts locally
      run: ./mvnw -B clean deploy -DskipTests '-P!central-publishing,jreleaser,release-profile'
        -DaltDeploymentRepository=local::file://${{ github.workspace }}/target/staging-deploy
        -pl '!samples/chat,!samples/embedded-jetty-websocket-chat,!samples/spring-boot-chat,!samples/quarkus-chat,!samples/spring-boot-ai-chat,!samples/spring-boot-ai-classroom,!samples/spring-boot-otel-chat,!samples/spring-boot-mcp-server,!samples/spring-boot-durable-sessions,!samples/spring-boot-ai-tools,!samples/spring-boot-rag-chat,!samples/grpc-chat,!samples/spring-boot-a2a-agent,!samples/spring-boot-agui-chat,!samples/spring-boot-channels-chat,!samples/spring-boot-dentist-agent,!samples/spring-boot-multi-agent-startup-team,!samples/spring-boot-koog-chat,!samples/spring-boot-orchestration-demo,!modules/integration-tests'
      env:
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    - name: Derive GPG public key from private key
      id: gpg
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      run: |
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import 2>&1 | head -5 || true
        KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep -m1 '^sec' | awk '{print $2}' | cut -d'/' -f2)
        {
          echo 'public_key<<GPG_PUBLIC_KEY_EOF'
          gpg --armor --export "$KEY_ID"
          echo 'GPG_PUBLIC_KEY_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Publish to Maven Central via JReleaser
      if: inputs.dry_run == false
      uses: jreleaser/release-action@v2
      with:
        arguments: 'deploy'
      env:
        JRELEASER_PROJECT_VERSION: ${{ inputs.release_version }}
        JRELEASER_GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
        JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        JRELEASER_GPG_PUBLIC_KEY: ${{ steps.gpg.outputs.public_key }}
        JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

    - name: Dry run — stage only (JReleaser dry-run)
      if: inputs.dry_run
      uses: jreleaser/release-action@v2
      with:
        arguments: 'deploy --dry-run'
      env:
        JRELEASER_PROJECT_VERSION: ${{ inputs.release_version }}
        JRELEASER_GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
        JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
        JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        JRELEASER_GPG_PUBLIC_KEY: ${{ steps.gpg.outputs.public_key }}
        JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

    - name: Upload JReleaser logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: jreleaser-logs-${{ inputs.release_version }}
        path: |
          out/jreleaser/trace.log
          out/jreleaser/output.properties
        retention-days: 14

    - name: Commit release version
      if: inputs.dry_run == false
      run: |
        git add -- pom.xml '**/pom.xml' README.md '**/README.md' || true
        git commit -m "release: Atmosphere ${{ inputs.release_version }}"
        # Remove stale tag from a previous failed attempt (if any)
        git tag -d "atmosphere-${{ inputs.release_version }}" 2>/dev/null || true
        git push origin ":refs/tags/atmosphere-${{ inputs.release_version }}" 2>/dev/null || true
        git tag "atmosphere-${{ inputs.release_version }}"

    - name: Set next development version
      if: inputs.dry_run == false
      run: |
        ./mvnw -B versions:set -DnewVersion=${{ inputs.next_dev_version }} -DgenerateBackupPoms=false
        git add -- pom.xml '**/pom.xml'
        git commit -m "chore: prepare for next development iteration ${{ inputs.next_dev_version }}"

    - name: Push commits and tag
      if: inputs.dry_run == false
      run: |
        # Show any leftover changes for debugging
        git status --short
        # Stash any unstaged changes (e.g. from Maven plugin side-effects)
        git stash --include-untracked || true
        # Rebase on latest main in case commits were pushed during the build
        git fetch origin main
        git rebase origin/main
        git push origin main
        git push origin "atmosphere-${{ inputs.release_version }}"

    - name: Sync atmosphere.github.io tutorial + website to release version
      # Mirrors the existing trigger-site-rebuild.yml pattern: fire a
      # repository_dispatch at the sibling repo using SITE_DISPATCH_TOKEN
      # and let the sibling's own workflow (sync-version.yml) run its
      # scripts/update-doc-versions.sh + commit + push via its own
      # GITHUB_TOKEN. No cross-repo cloning, no second token — reuses
      # the auth the website rebuild already uses.
      #
      # Release 4.0.36 shipped with 23 stale SNAPSHOT references in the
      # sibling docs because no cross-repo sync existed. This step closes
      # that gap for every future release.
      if: inputs.dry_run == false
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ secrets.SITE_DISPATCH_TOKEN }}
        repository: Atmosphere/atmosphere.github.io
        event-type: sync-version
        client-payload: '{"version": "${{ inputs.release_version }}"}'

    outputs:
      tag: atmosphere-${{ inputs.release_version }}

  # ─────────────────────────────────────────────
  # Phase 3b: Publish to GitHub Packages
  # ─────────────────────────────────────────────
  release-github-packages:
    name: Publish to GitHub Packages
    needs: [release-maven]
    if: inputs.dry_run == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v6
      with:
        ref: atmosphere-${{ inputs.release_version }}

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'maven'

    - name: Configure Maven settings
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'EOF'
        <settings>
          <servers>
            <server>
              <id>github</id>
              <username>${env.GITHUB_ACTOR}</username>
              <password>${env.GITHUB_TOKEN}</password>
            </server>
            <server>
              <id>central</id>
              <username>unused</username>
              <password>unused</password>
            </server>
          </servers>
        </settings>
        EOF

    - name: Install locally first
      run: ./mvnw -B install -DskipTests -Dgpg.skip=true -DskipCentralPublishing=true -Pfastinstall

    - name: Deploy to GitHub Packages
      run: |
        ./mvnw -B deploy -DskipTests -Dgpg.skip=true \
          -DskipCentralPublishing=true \
          -Dmaven.deploy.skip=false \
          -Pfastinstall \
          -DaltDeploymentRepository=github::https://maven.pkg.github.com/Atmosphere/atmosphere
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Phase 4: Publish atmosphere.js to NPM
  # ─────────────────────────────────────────────
  release-js:
    name: Publish atmosphere.js to NPM
    needs: [build-js, release-maven]
    if: inputs.publish_js && inputs.dry_run == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
    - uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0

    - name: Pull latest (after Maven release commit)
      run: git pull origin main

    - name: Check for atmosphere.js changes
      id: detect
      run: |
        # Read the version from package.json
        JS_VERSION=$(node -p "require('./atmosphere.js/package.json').version")
        echo "atmosphere.js version in package.json: $JS_VERSION"

        # Check if this version is already published to NPM
        if npm view "atmosphere.js@$JS_VERSION" version >/dev/null 2>&1; then
          echo "atmosphere.js@$JS_VERSION already published to NPM — skipping publish"
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Find the latest JS release tag (check both formats for backwards compat)
        LAST_TAG=$(git tag --list 'js-v*' --sort=-v:refname | head -1)
        if [ -z "$LAST_TAG" ]; then
          LAST_TAG=$(git tag --list 'atmosphere.js-v*' --sort=-v:refname | head -1)
        fi
        if [ -z "$LAST_TAG" ]; then
          echo "No previous JS release tag found — treating as first release"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        elif git diff --quiet "$LAST_TAG" -- atmosphere.js/; then
          echo "No changes in atmosphere.js/ since $LAST_TAG — skipping publish"
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        else
          echo "Changes detected in atmosphere.js/ since $LAST_TAG"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Node.js 24
      if: steps.detect.outputs.has_changes == 'true'
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        cache-dependency-path: atmosphere.js/package-lock.json

    - name: Configure Git
      if: steps.detect.outputs.has_changes == 'true'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

    - name: Download JS dist
      if: steps.detect.outputs.has_changes == 'true'
      uses: actions/download-artifact@v8
      with:
        name: atmosphere-js-dist
        path: atmosphere.js/dist/

    - name: Publish to NPM (Trusted Publishing / OIDC)
      if: steps.detect.outputs.has_changes == 'true'
      working-directory: atmosphere.js
      run: |
        npm ci
        npm publish --provenance --access public

    - name: Commit and tag JS release
      if: steps.detect.outputs.has_changes == 'true'
      run: |
        JS_VERSION=$(node -p "require('./atmosphere.js/package.json').version")
        cd atmosphere.js
        git add package.json package-lock.json
        cd ..
        git diff --cached --quiet || git commit -m "release(js): atmosphere.js ${JS_VERSION}"
        git tag "js-v${JS_VERSION}"

    - name: Publish create-atmosphere-app to NPM
      working-directory: cli/npx
      run: npm publish --provenance --access public 2>/dev/null || echo "create-atmosphere-app publish skipped (may already exist)"

    - name: Bump to next patch version
      if: steps.detect.outputs.has_changes == 'true'
      working-directory: atmosphere.js
      run: npm version patch --no-git-tag-version

    - name: Commit next dev version
      if: steps.detect.outputs.has_changes == 'true'
      run: |
        NEXT_VERSION=$(node -p "require('./atmosphere.js/package.json').version")
        cd atmosphere.js
        git add package.json package-lock.json
        cd ..
        git commit -m "chore(js): prepare next development version ${NEXT_VERSION}"
        git push origin main --tags

  # ─────────────────────────────────────────────
  # Phase 5: Create GitHub Release with notes
  # ─────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [release-maven]
    if: inputs.dry_run == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0

    - name: Pull latest
      run: git pull origin main

    - name: Extract release notes from CHANGELOG
      id: notes
      run: |
        VERSION="${{ inputs.release_version }}"
        # Extract the section for this version from CHANGELOG.md
        # Matches from "## [VERSION]" until the next "## [" or end of file
        NOTES=$(awk -v ver="$VERSION" '
          /^## \[/ {
            if (found) exit
            if (index($0, "[" ver "]")) { found=1; next }
          }
          found { print }
        ' CHANGELOG.md)

        if [ -z "$NOTES" ]; then
          echo "No CHANGELOG entry found for $VERSION — using commit-based notes"
          echo "has_changelog=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_changelog=true" >> "$GITHUB_OUTPUT"
          echo "$NOTES" > /tmp/release-notes.md
        fi

    - name: Generate release notes from commits
      if: steps.notes.outputs.has_changelog == 'false'
      run: |
        VERSION="${{ inputs.release_version }}"
        TAG="atmosphere-${VERSION}"

        # Find the previous tag
        PREV_TAG=$(git tag --list 'atmosphere-4.*' --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
        if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
          PREV_TAG=$(git rev-list --max-parents=0 HEAD | tail -1)
        fi

        # Build categorized notes from conventional commit prefixes
        {
          echo ""
          FEATS=$(git log --oneline "$PREV_TAG".."$TAG" --grep='^feat' --format='- %s' | sed 's/^- feat[^:]*: /- **/' | sed 's/$/**/' | head -20)
          if [ -n "$FEATS" ]; then
            echo "## ✨ Added"
            echo "$FEATS"
            echo ""
          fi

          FIXES=$(git log --oneline "$PREV_TAG".."$TAG" --grep='^fix' --format='- %s' | sed 's/^- fix[^:]*: /- /' | head -20)
          if [ -n "$FIXES" ]; then
            echo "## 🐛 Fixed"
            echo "$FIXES"
            echo ""
          fi

          CHORES=$(git log --oneline "$PREV_TAG".."$TAG" --grep='^refactor\|^chore\|^docs\|^ci\|^test' --format='- %s' | sed 's/^- [a-z]*[^:]*: /- /' | head -15)
          if [ -n "$CHORES" ]; then
            echo "## 🔧 Changed"
            echo "$CHORES"
            echo ""
          fi

          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
        } > /tmp/release-notes.md

    - name: Build SDKMAN archive (well-formed atmosphere-${VERSION}.zip)
      run: |
        VERSION="${{ inputs.release_version }}"
        STAGE=$(mktemp -d)
        ARCHIVE_DIR="$STAGE/atmosphere-${VERSION}/bin"
        mkdir -p "$ARCHIVE_DIR"

        # Copy the CLI script and pin VERSION= to the release version
        # (the cli/atmosphere file is still at the pre-release SNAPSHOT at this phase —
        # Phase 6 update-cli bumps it afterwards, too late for this archive build)
        cp cli/atmosphere "$ARCHIVE_DIR/atmosphere"
        sed -i "s/^VERSION=\"[^\"]*\"/VERSION=\"$VERSION\"/" "$ARCHIVE_DIR/atmosphere"
        chmod +x "$ARCHIVE_DIR/atmosphere"

        # Windows launcher — SDKMAN UNIVERSAL archives should support Windows via .bat
        cat > "$ARCHIVE_DIR/atmosphere.bat" <<'BAT'
        @echo off
        REM Atmosphere CLI launcher for Windows — requires bash (Git Bash or WSL)
        bash "%~dp0atmosphere" %*
        BAT

        # Create the ZIP with the well-formed layout
        cd "$STAGE" && zip -r "atmosphere-${VERSION}.zip" "atmosphere-${VERSION}/"
        mv "$STAGE/atmosphere-${VERSION}.zip" "$GITHUB_WORKSPACE/atmosphere-${VERSION}.zip"

        # Compute SHA256 for vendor API / verification
        sha256sum "$GITHUB_WORKSPACE/atmosphere-${VERSION}.zip" | tee "$GITHUB_WORKSPACE/atmosphere-${VERSION}.zip.sha256"
        ls -la "$GITHUB_WORKSPACE/atmosphere-${VERSION}.zip"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: atmosphere-${{ inputs.release_version }}
        name: Atmosphere ${{ inputs.release_version }}
        body_path: /tmp/release-notes.md
        generate_release_notes: false
        draft: false
        prerelease: ${{ contains(inputs.release_version, '-') }}
        files: |
          atmosphere-${{ inputs.release_version }}.zip
          atmosphere-${{ inputs.release_version }}.zip.sha256
      env:
        GITHUB_TOKEN: ${{ github.token }}

  # ─────────────────────────────────────────────
  # Phase 6: Update CLI version + Homebrew tap
  # ─────────────────────────────────────────────
  update-cli:
    name: Update CLI & Homebrew
    needs: [github-release]
    if: inputs.dry_run == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0

    - name: Pull latest
      run: git pull origin main

    - name: Configure Git
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

    - name: Update CLI version in all files
      run: |
        VERSION="${{ inputs.release_version }}"

        # Update samples.json version
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" cli/samples.json

        # Update atmosphere CLI version
        sed -i "s/^VERSION=\"[^\"]*\"/VERSION=\"$VERSION\"/" cli/atmosphere

        # Update install.sh version
        sed -i "s/^VERSION=\"[^\"]*\"/VERSION=\"$VERSION\"/" cli/install.sh

        # Update npx package version
        sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" cli/npx/package.json

    - name: Commit and push CLI version bump
      run: |
        git add cli/samples.json cli/atmosphere cli/install.sh cli/npx/package.json
        git diff --cached --quiet || {
          git commit -m "chore(cli): bump version to ${{ inputs.release_version }}"
          git push origin main
        }

    - name: Update Homebrew tap
      env:
        GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
      run: |
        VERSION="${{ inputs.release_version }}"
        TAG="atmosphere-${VERSION}"
        TARBALL_URL="https://github.com/Atmosphere/atmosphere/archive/refs/tags/${TAG}.tar.gz"

        # Download tarball and compute SHA256
        curl -fsSL -o /tmp/release.tar.gz "$TARBALL_URL"
        SHA256=$(sha256sum /tmp/release.tar.gz | cut -d' ' -f1)

        # Clone the tap repo
        git clone "https://x-access-token:${GH_TOKEN}@github.com/Atmosphere/homebrew-tap.git" /tmp/homebrew-tap
        cd /tmp/homebrew-tap

        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

        # Update formula
        sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" Formula/atmosphere.rb
        sed -i "s|# sha256 .*|sha256 \"${SHA256}\"|" Formula/atmosphere.rb
        sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/atmosphere.rb
        sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/atmosphere.rb

        git add Formula/atmosphere.rb
        git diff --cached --quiet || {
          git commit -m "chore: update atmosphere to ${VERSION}"
          git push origin main
        }
