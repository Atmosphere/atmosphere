name: "CI: E2E (Real LLM — Ollama)"

# The SINGLE real-LLM tier: runs against a local Ollama service container with a
# small model (qwen2.5:1.5b) so regressions in the Built-in / Spring AI / LC4j
# OpenAI bridges are caught against a real provider, not just FakeLlmClient.
# Ollama is now the only real-LLM backend in CI — the paid Gemini/OpenAI lane was
# retired for predictability (no keys, no rate limits, no provider model drift;
# the trade-off is we no longer smoke-test the real OpenAI/Gemini wire, only
# Ollama's OpenAI-compatible surface). The per-push GATING lanes stay on the
# deterministic FakeLlmClient / DemoAgentRuntime — those are strictly more
# predictable than any real model, and this tier deliberately does not gate.
#
# Reproducibility: qwen2.5:1.5b is the smallest model that reliably follows an
# injected system-prompt instruction (0.5b ignores it — validated locally), and
# LLM_TEMPERATURE=0 pins sampling. Assertions favour verbatim-echoed tokens.
#
# Cost: $0 — Ollama is local to the runner.
# Coverage: basic chat, structured output, embeddings across 3 runtimes, plus the
# governance learning-signal loop (soft-preference steers the answer).
#
# NOT ON THE PER-PUSH GATING PATH — runs nightly and on demand. Ollama on
# GitHub-hosted CPU runners is slow: model-load latency routinely overruns the
# spec waits, so making this a required per-push check would gate merges on a
# flaky external service. Rather than run it on every push and mask the result
# with `continue-on-error` (a red X that doesn't count — a hack), we keep it off
# the push path and let it report HONESTLY: when it runs, a failure is a real
# signal to re-run or investigate, not a silent "success". Not in main's
# required status checks; do not add it to branch protection without asking the
# maintainer.

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: e2e-real-llm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ollama-e2e:
    name: Ollama real-llm-chat
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        # No --health-cmd: Ollama's image has no curl, so the in-container
        # healthcheck always fails. We wait from the job step with the
        # runner's curl instead (curl IS available on ubuntu-latest).
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          # Supply-chain hardening: GPG-verify the Temurin JDK archive (setup-java >= v5.5.0)
          verify-signature: true
          java-version: '21'
          cache: maven

      - name: Wait for Ollama + warm model
        run: |
          # Poll the host-side port until Ollama's HTTP server is up.
          for i in $(seq 1 60); do
            if curl -sSf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama ready after ${i}s"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "Ollama did not become ready within 60s" >&2
              exit 1
            fi
            sleep 1
          done
          # Pull the model — qwen2.5:1.5b is ~1GB, the smallest that reliably
          # follows an injected system-prompt instruction (the governance spec).
          # Cost: $0.
          curl -sSf http://localhost:11434/api/pull -d '{"name":"qwen2.5:1.5b"}' \
            | tail -1
          curl -sSf http://localhost:11434/api/tags | tee ollama-tags.json
          # Warm-up inference — loading the model into RAM on the first
          # real request takes ~15-30s on a cold CPU runner, which blows past
          # the spec's 30s waitForDone. Force the load here so the in-test
          # chat/completions call sees a hot model and streams immediately.
          # Also proves the OpenAI-compat surface accepts our request shape.
          echo "Warming up qwen2.5:1.5b via /v1/chat/completions..."
          curl -sSf http://localhost:11434/v1/chat/completions \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ollama-no-key-needed' \
            -d '{
              "model":"qwen2.5:1.5b",
              "messages":[{"role":"user","content":"hi"}],
              "stream":false,
              "max_tokens":5
            }' | head -c 500 || echo "Warm-up curl exited non-zero (will still run spec)"
          echo

      - name: Build reactor (full install, tests skipped)
        run: |
          # Full-reactor install, exactly like ci.yml's boot gate: a scoped
          # -pl ... -am build fails Quarkus's extension dependency
          # verification on a cold ~/.m2 (the deployment artifact resolves
          # in-reactor instead of from the repo). This also provides
          # integration-tests (the Playwright fixture spawns
          # AiFeatureTestServer from it) and every sample the lane boots.
          ./mvnw -B -q install -DskipTests -Dgpg.skip=true

      - name: Package quarkus-ai-chat sample
        run: |
          # The quarkus-ai-chat playwright project drives the packaged
          # quarkus-run.jar. The full-reactor install above already built and
          # installed every dependency; this scoped package just (re)produces
          # target/quarkus-app/quarkus-run.jar for the fixture to boot.
          ./mvnw -q package -pl samples/quarkus-ai-chat -DskipTests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: modules/integration-tests/package-lock.json

      - name: Install Playwright Dependencies
        working-directory: modules/integration-tests
        run: |
          npm ci
          for attempt in 1 2 3; do
            if npx playwright install --with-deps chromium; then break; fi
            [ "$attempt" = "3" ] && exit 1
            sleep "${attempt}0"
          done

      - name: Run real-LLM E2E
        working-directory: modules/integration-tests
        env:
          LLM_MODE: real-ollama
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: qwen2.5:1.5b
          LLM_API_KEY: ollama-no-key-needed
          # Pin sampling for reproducibility (LLM_TEMPERATURE -> AiConfig temperature).
          LLM_TEMPERATURE: '0'
        run: |
          npx playwright test --project=real-llm-chat --reporter=list

      - name: Run quarkus-ai-chat real-LLM E2E
        working-directory: modules/integration-tests
        env:
          # Same Ollama target — the quarkus-ai-chat application.properties
          # substitutes ${LLM_BASE_URL}, ${LLM_MODEL}, ${LLM_API_KEY} into
          # the quarkus.langchain4j.openai.* keys, so propagating these env
          # vars is enough to point the bridge at the local Ollama service.
          LLM_MODE: real-ollama
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: qwen2.5:1.5b
          LLM_API_KEY: ollama-no-key-needed
          LLM_TEMPERATURE: '0'
        run: |
          npx playwright test --project=quarkus-ai-chat --reporter=list

      # ── Governance learning-signal loop (spring-boot-ai-chat) ──────────
      # Proves the loop end-to-end on a real model: a production-deploy question
      # fires the soft-preference PreferencePolicy and GovernanceFeedbackInterceptor
      # injects the org-specific advisory, so the answer names the Example Corp
      # release-bot process — a token the base model cannot know, so the assertion
      # fails when the loop is off (validated locally on qwen2.5:1.5b, 3/3).
      # Uses the e2e/ foundation Playwright project (not integration-tests) and
      # reuses the warm Ollama above.
      - name: Install e2e Playwright deps
        working-directory: e2e
        run: |
          npm ci
          # e2e/ may pin a different @playwright/test than integration-tests, so
          # install its own chromium build (cached; no-op if already present).
          npx playwright install chromium

      - name: Start spring-boot-ai-chat (Ollama)
        env:
          LLM_MODE: local
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: qwen2.5:1.5b
          LLM_API_KEY: ollama-no-key-needed
          LLM_TEMPERATURE: '0'
        run: |
          # Defensive: free 8080 in case a prior Playwright webServer lingers
          # (the integration-tests projects also bind 8080). Kill by PID only.
          for p in $(lsof -ti:8080 2>/dev/null); do kill "$p" 2>/dev/null || true; done
          sleep 2
          # Backgrounded spring-boot:run; torn down via PID file below. The
          # reactor install above already built the sample.
          # The token-less console must render the Decisions tab, so this demo
          # run opts out of the fail-closed recorded-content read gate (Inv #6);
          # the sample keeps the secure default out-of-box (see application.yml).
          nohup ./mvnw -pl samples/spring-boot-ai-chat -q spring-boot:run \
              -Dspring-boot.run.arguments=--atmosphere.admin.content-read-auth-required=false \
              > /tmp/ai-chat-run.log 2>&1 &
          echo $! > /tmp/ai-chat.pid

      - name: Wait for the console
        # The static console is served once the web context (and the Atmosphere
        # framework servlet) finished init; the spec's own "Connected" wait +
        # CI retries cover the WebSocket-ready race.
        run: npx --yes wait-on --timeout 180000 http://localhost:8080/atmosphere/console/

      - name: Run governance-feedback spec
        working-directory: e2e
        env:
          ATMO_E2E_BASE_URL: http://localhost:8080
        run: npx playwright test tests/governance-feedback-chat.spec.ts --reporter=list

      - name: Stop spring-boot-ai-chat
        if: always()
        run: '[ -f /tmp/ai-chat.pid ] && kill "$(cat /tmp/ai-chat.pid)" || true'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: real-llm-ollama
          path: |
            modules/integration-tests/test-results/
            modules/integration-tests/playwright-report/
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
