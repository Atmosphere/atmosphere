name: "CI: E2E (Real LLM — Ollama)"

# Real-LLM tier: runs against a local Ollama service container with a small
# model (qwen2.5:0.5b) so regressions in the Built-in / Spring AI / LC4j OpenAI
# bridges are caught against a real provider, not just FakeLlmClient.
#
# Cost: $0 — Ollama is local to the runner.
# Coverage: basic chat, structured output, embeddings across 3 runtimes.
#
# NOT ON THE PER-PUSH GATING PATH — runs nightly and on demand. Ollama on
# GitHub-hosted CPU runners is slow: model-load latency routinely overruns the
# spec waits, so making this a required per-push check would gate merges on a
# flaky external service. Rather than run it on every push and mask the result
# with `continue-on-error` (a red X that doesn't count — a hack), we keep it off
# the push path and let it report HONESTLY: when it runs, a failure is a real
# signal to re-run or investigate, not a silent "success". Not in main's
# required status checks; do not add it to branch protection without asking the
# maintainer. (The Tier-2 paid workflow e2e-real-llm-paid.yml is scheduled for
# the same reason.)

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: e2e-real-llm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ollama-e2e:
    name: Ollama real-llm-chat
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        # No --health-cmd: Ollama's image has no curl, so the in-container
        # healthcheck always fails. We wait from the job step with the
        # runner's curl instead (curl IS available on ubuntu-latest).
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Wait for Ollama + warm model
        run: |
          # Poll the host-side port until Ollama's HTTP server is up.
          for i in $(seq 1 60); do
            if curl -sSf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama ready after ${i}s"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "Ollama did not become ready within 60s" >&2
              exit 1
            fi
            sleep 1
          done
          # Pull a small model for structural tests — qwen2.5:0.5b is ~400MB
          # and responds to simple prompts quickly. Cost: $0.
          curl -sSf http://localhost:11434/api/pull -d '{"name":"qwen2.5:0.5b"}' \
            | tail -1
          curl -sSf http://localhost:11434/api/tags | tee ollama-tags.json
          # Warm-up inference — loading the 400MB model into RAM on the first
          # real request takes ~15-30s on a cold CPU runner, which blows past
          # the spec's 30s waitForDone. Force the load here so the in-test
          # chat/completions call sees a hot model and streams immediately.
          # Also proves the OpenAI-compat surface accepts our request shape.
          echo "Warming up qwen2.5:0.5b via /v1/chat/completions..."
          curl -sSf http://localhost:11434/v1/chat/completions \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ollama-no-key-needed' \
            -d '{
              "model":"qwen2.5:0.5b",
              "messages":[{"role":"user","content":"hi"}],
              "stream":false,
              "max_tokens":5
            }' | head -c 500 || echo "Warm-up curl exited non-zero (will still run spec)"
          echo

      - name: Build atmosphere-ai + integration-tests
        run: |
          # integration-tests is required so mvnw exec:java can load
          # AiFeatureTestServer (the Playwright fixture spawns it). -am
          # pulls all transitive modules including ai, ai-test, and the
          # runtime bridges the real-LLM handler touches at startup.
          ./mvnw -q install -pl modules/integration-tests -am -DskipTests

      - name: Package quarkus-ai-chat sample
        run: |
          # The quarkus-ai-chat playwright project drives the packaged Quarkus
          # JAR (target/quarkus-app/quarkus-run.jar). The previous step's
          # install does not run the package phase, so the runnable artifact
          # would not exist; package once explicitly here.
          ./mvnw -q install -pl samples/quarkus-ai-chat -am -DskipTests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: modules/integration-tests/package-lock.json

      - name: Install Playwright Dependencies
        working-directory: modules/integration-tests
        run: |
          npm ci
          for attempt in 1 2 3; do
            if npx playwright install --with-deps chromium; then break; fi
            [ "$attempt" = "3" ] && exit 1
            sleep "${attempt}0"
          done

      - name: Run real-LLM E2E
        working-directory: modules/integration-tests
        env:
          LLM_MODE: real-ollama
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: qwen2.5:0.5b
          LLM_API_KEY: ollama-no-key-needed
        run: |
          npx playwright test --project=real-llm-chat --reporter=list

      - name: Run quarkus-ai-chat real-LLM E2E
        working-directory: modules/integration-tests
        env:
          # Same Ollama target — the quarkus-ai-chat application.properties
          # substitutes ${LLM_BASE_URL}, ${LLM_MODEL}, ${LLM_API_KEY} into
          # the quarkus.langchain4j.openai.* keys, so propagating these env
          # vars is enough to point the bridge at the local Ollama service.
          LLM_MODE: real-ollama
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: qwen2.5:0.5b
          LLM_API_KEY: ollama-no-key-needed
        run: |
          npx playwright test --project=quarkus-ai-chat --reporter=list

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: real-llm-ollama
          path: |
            modules/integration-tests/test-results/
            modules/integration-tests/playwright-report/
          retention-days: 7
