name: "Publish: GitHub Packages"

# Standalone publisher for the Maven artifacts of an already-tagged release to
# GitHub Packages. The main release workflow (release-4x.yml) does this as part
# of its run, but if that job is skipped (e.g. an upstream job failed on a
# transient error after Maven Central already published), this lets the release
# be completed for GitHub Packages without re-running — and re-deploying — the
# Maven Central / tag steps.

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Released version to publish to GitHub Packages (e.g. 4.0.52)'
        required: true
        type: string

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v7
      with:
        ref: atmosphere-${{ inputs.release_version }}

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'
        # Supply-chain hardening: GPG-verify the Temurin JDK archive (setup-java >= v5.5.0)
        verify-signature: true
        cache: 'maven'

    - name: Configure Maven settings
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'EOF'
        <settings>
          <servers>
            <server>
              <id>github</id>
              <username>${env.GITHUB_ACTOR}</username>
              <password>${env.GITHUB_TOKEN}</password>
            </server>
            <server>
              <id>central</id>
              <username>unused</username>
              <password>unused</password>
            </server>
          </servers>
        </settings>
        EOF

    - name: Install locally first
      run: ./mvnw -B install -DskipTests -Dgpg.skip=true -DskipCentralPublishing=true -Pfastinstall

    - name: Deploy to GitHub Packages
      run: |
        ./mvnw -B deploy -DskipTests -Dgpg.skip=true \
          -DskipCentralPublishing=true \
          -Dmaven.deploy.skip=false \
          -Pfastinstall \
          -DaltDeploymentRepository=github::https://maven.pkg.github.com/Atmosphere/atmosphere
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
