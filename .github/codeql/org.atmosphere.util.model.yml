extensions:
  - addsTo:
      pack: codeql/java-all
      extensible: barrierModel
    data:
      # HtmlEncoder.encode() sanitizes HTML injection (XSS)
      - ["org.atmosphere.util", "HtmlEncoder", True, "encode", "(String)", "", "ReturnValue", "html-injection", "manual"]
      # Same method also sanitizes JS injection
      - ["org.atmosphere.util", "HtmlEncoder", True, "encode", "(String)", "", "ReturnValue", "js-injection", "manual"]
