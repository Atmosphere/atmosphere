version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      # org.json:json was retired from this repo in 4.0.42-SNAPSHOT (replaced by
      # Jackson 3 / tools.jackson.*). GitHub's dependency graph still carries a
      # stale entry pointing at /modules/runtime — a directory that doesn't
      # exist (the artifact lives at /modules/cpr) — so security-advisory jobs
      # for org.json:json keep failing with "path not found". Suppress until
      # the graph self-heals.
      - dependency-name: "org.json:json"

  # Sample frontends + atmosphere.js + spring-boot-starter front-end.
  # Without watchers here, postcss/react/etc. CVEs in sample lockfiles
  # accumulate as alerts but never get auto-PR'd. Consolidated under one
  # update config via the `directories:` plural form.
  - package-ecosystem: "npm"
    directories:
      - "/atmosphere.js"
      - "/modules/spring-boot-starter/frontend"
      - "/samples/chat/frontend"
      - "/samples/embedded-jetty-websocket-chat/frontend"
      - "/samples/grpc-chat/frontend"
      - "/samples/quarkus-chat/frontend"
      - "/samples/spring-boot-a2a-agent/frontend"
      - "/samples/spring-boot-agui-chat/frontend"
      - "/samples/spring-boot-ai-chat/frontend"
      - "/samples/spring-boot-ai-classroom/frontend"
      - "/samples/spring-boot-ai-tools/frontend"
      - "/samples/spring-boot-chat/frontend"
      - "/samples/spring-boot-mcp-server/frontend"
      - "/samples/spring-boot-multi-agent-startup-team/frontend"
      - "/samples/spring-boot-rag-chat/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      sample-frontend:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
