# Configuration for GitHub's automatic dependency submission (Maven).
# The default 'mvn validate' fails because inter-module SNAPSHOT
# dependencies (e.g. atmosphere-ai → atmosphere-runtime) are not
# resolvable without a full reactor build.
#
# Use 'install -DskipTests' so the reactor installs each module into
# the local repo before downstream modules resolve their dependencies.
maven:
  command: ./mvnw install -DskipTests -Pfastinstall -q
