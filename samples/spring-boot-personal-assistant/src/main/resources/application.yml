server:
  port: 8080

atmosphere:
  # Workspace the foundation primitives load from on startup.
  # Override with --atmosphere.workspace=/path/to/workspace to point at your
  # own OpenClaw directory or a different fixture. Defaults here resolve to
  # the bundled sample workspace shipped under .agent-workspace/.
  workspace: classpath:agent-workspace

  ai:
    # Any of the seven runtime artifacts on the classpath is picked up by
    # AgentRuntime ServiceLoader discovery. Spring AI is added per the
    # v0.5 plan; switching to another runtime is a Maven dependency swap.
    runtime: spring-ai

spring:
  application:
    name: atmosphere-personal-assistant
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
