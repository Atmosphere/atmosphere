server:
  port: 8080

atmosphere:
  # Tell the Spring Boot starter where the sample's @Coordinator / @Agent
  # classes live. Without this the starter only scans core org.atmosphere.*
  # packages and the crew never registers.
  packages: org.atmosphere.samples.springboot.personalassistant

  # Workspace the foundation primitives load from on startup. Override with
  # --atmosphere.workspace=/path/to/workspace to point at your own OpenClaw
  # directory. Defaults resolve to the bundled workspace under
  # agent-workspace/.
  workspace: classpath:agent-workspace

  ai:
    # Any of the seven runtime artifacts on the classpath is picked up by
    # AgentRuntime ServiceLoader discovery. Switching runtimes is a Maven
    # dependency swap plus setting this to the runtime name.
    runtime: spring-ai
    # This proof sample keeps a deterministic keyword-router fallback that
    # runs without LLM credentials, so we opt out of the starter's
    # fail-fast default. Production apps should leave fail-fast on.
    fail-fast: false

spring:
  application:
    name: atmosphere-personal-assistant
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
