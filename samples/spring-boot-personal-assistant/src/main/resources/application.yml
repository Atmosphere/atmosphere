server:
  port: 8080

atmosphere:
  # Tell the Spring Boot starter where the sample's @Coordinator / @Agent
  # classes live. Without this the starter only scans core org.atmosphere.*
  # packages and the crew never registers.
  packages: org.atmosphere.samples.springboot.personalassistant

  # Workspace the foundation primitives load from on startup. Override with
  # --atmosphere.workspace=/path/to/workspace to point at your own OpenClaw
  # directory. Defaults resolve to the bundled workspace under
  # agent-workspace/.
  workspace: classpath:agent-workspace

  ai:
    # Deep-agent harness, turned on APP-WIDE by the deep-agent.enabled flag
    # below: every @AiEndpoint and @Agent in this app is completed with
    # conversation memory, long-term memory (facts extracted at session close,
    # recalled on the next connection), and a conservative prompt-cache default
    # with no per-class wiring. The plain @AiEndpoint UpstreamMcpAgent relies on
    # this flag for its long-term memory — it replaced the sample's former
    # three-class static-holder wiring. Per-primitive runtime state is visible
    # in the console (/api/console/info, "deepAgent" section). A single full
    # agent can instead opt in on its own with @Agent(deepAgent = true) (see
    # ResearchAgent) rather than flipping this app-wide flag.
    deep-agent:
      enabled: true

    # Any of the seven runtime artifacts on the classpath is picked up by
    # AgentRuntime ServiceLoader discovery. Switching runtimes is a Maven
    # dependency swap plus setting this to the runtime name.
    runtime: spring-ai
    # This proof sample keeps a deterministic keyword-router fallback that
    # runs without LLM credentials, so we opt out of the starter's
    # fail-fast default. Production apps should leave fail-fast on.
    fail-fast: false

  # Outbound-MCP demo: UpstreamMcpAgent connects to a remote MCP server at
  # this URL on startup and surfaces its tools to the agent loop via
  # McpToolsInterceptor. Default points at the bundled spring-boot-mcp-server
  # (port 8083) so the two samples can run side-by-side. Override to test
  # against any external MCP server (Anthropic reference servers, GitHub,
  # filesystem, etc.).
  mcp:
    client:
      endpoint: ${ATMOSPHERE_MCP_CLIENT_ENDPOINT:http://localhost:8083/atmosphere/mcp}

# LLM wiring — runtime is selected by classpath. With only atmosphere-ai on
# the default classpath, the Built-in OpenAI-compatible runtime wins. Add
# atmosphere-langchain4j (via the runtime-langchain4j Maven profile) to swap
# to that runtime — the @AiEndpoint code stays unchanged.
llm:
  mode: ${LLM_MODE:remote}
  model: ${LLM_MODEL:gemini-2.5-flash-lite}
  base-url: ${LLM_BASE_URL:}
  api-key: ${LLM_API_KEY:${GEMINI_API_KEY:}}

spring:
  application:
    name: atmosphere-personal-assistant
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
