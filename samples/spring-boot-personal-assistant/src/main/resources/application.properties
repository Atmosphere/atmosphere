server.port=8080

# Tell the Atmosphere Spring Boot starter where the user's @Coordinator /
# @Agent / @AiEndpoint classes live. Without this, the starter only scans
# core org.atmosphere.* packages and never registers the sample's agents.
atmosphere.packages=org.atmosphere.samples.springboot.personalassistant

# Workspace the foundation primitives load from on startup.
# Override with --atmosphere.workspace=/path/to/workspace to point at your
# own OpenClaw directory or a different fixture. Defaults resolve to the
# bundled sample workspace shipped under agent-workspace/.
atmosphere.workspace=classpath:agent-workspace

# Any of the seven runtime artifacts on the classpath is picked up by
# AgentRuntime ServiceLoader discovery. Switching to another runtime is
# a Maven dependency swap + setting this property to the runtime name.
atmosphere.ai.runtime=spring-ai

spring.application.name=atmosphere-personal-assistant
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
