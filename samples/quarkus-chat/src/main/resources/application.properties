quarkus.atmosphere.packages=org.atmosphere.samples.quarkus.chat
quarkus.log.category."org.atmosphere".level=DEBUG
quarkus.log.category."io.undertow.websockets".level=DEBUG

# Admin control plane — writes disabled unless explicitly enabled via env.
# CI sets ATMOSPHERE_ADMIN_HTTP_WRITE_ENABLED=true + ATMOSPHERE_ADMIN_AUTH_TOKEN
# so the admin-quarkus.spec.ts write tests can authenticate via
# X-Atmosphere-Auth against a known token (demo-token).
atmosphere.admin.http-write-enabled=${ATMOSPHERE_ADMIN_HTTP_WRITE_ENABLED:false}
atmosphere.admin.auth.token=${ATMOSPHERE_ADMIN_AUTH_TOKEN:}
