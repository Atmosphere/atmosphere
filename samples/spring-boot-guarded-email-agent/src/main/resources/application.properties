server.port=8080
spring.main.banner-mode=off

# Atmosphere transport — Servlet 3 async; nothing fancy needed for this
# REST-only sample, but the starter wires AtmosphereServlet by default.
atmosphere.broadcaster.lifecycle-policy=NEVER

# The Validation tab's POST /api/admin/verifier/check executes a plan once it
# passes every verifier (the "executed" outcome the demo shows). Executing a
# verified plan is an admin write, so the admin write surface must be enabled.
# Auth is still enforced: guardWrite requires an operator principal, which the
# demo TokenValidator resolves from the auto-provisioned token. Production apps
# leave this off by default (secure default).
atmosphere.admin.http-write-enabled=true

logging.level.root=INFO
logging.level.org.atmosphere.verifier=DEBUG
logging.level.org.atmosphere.samples.springboot.guardedemail=DEBUG
