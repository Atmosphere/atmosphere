server.port=8080
spring.main.banner-mode=off

# Atmosphere transport — Servlet 3 async; nothing fancy needed for this
# REST-only sample, but the starter wires AtmosphereServlet by default.
atmosphere.broadcaster.lifecycle-policy=NEVER

logging.level.root=INFO
logging.level.org.atmosphere.verifier=DEBUG
logging.level.org.atmosphere.samples.springboot.guardedemail=DEBUG
