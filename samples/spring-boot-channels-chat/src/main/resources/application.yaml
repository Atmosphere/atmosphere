atmosphere:
  packages: org.atmosphere.samples.channels
  ai:
    enabled: true
    mode: remote
    # Set LLM_API_KEY and LLM_MODEL env vars to connect a real LLM
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:gemini-2.5-flash}

  # External messaging channels — each activates when credentials are set
  channels:
    telegram:
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}
    slack:
      bot-token: ${SLACK_BOT_TOKEN:}
      signing-secret: ${SLACK_SIGNING_SECRET:}
    discord:
      bot-token: ${DISCORD_BOT_TOKEN:}
      public-key: ${DISCORD_PUBLIC_KEY:}
    whatsapp:
      phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
      access-token: ${WHATSAPP_ACCESS_TOKEN:}
      app-secret: ${WHATSAPP_APP_SECRET:}
    messenger:
      page-access-token: ${MESSENGER_PAGE_TOKEN:}
      app-secret: ${MESSENGER_APP_SECRET:}
