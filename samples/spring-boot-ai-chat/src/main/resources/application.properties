# Disable token auth by default so the bundled AI Console connects without
# extra steps — this sample's headline feature is AI streaming, not auth.
# Set to true (or remove this line) to demo the AuthConfig token flow:
# 1. POST /api/auth/login -> { "token": "demo-token" }
# 2. Send X-Atmosphere-Auth: demo-token (or ?X-Atmosphere-Auth=demo-token)
#    on the WebSocket / long-poll handshake.
# Per Correctness Invariant #6, framework default is fail-closed; this
# sample-level override is explicit and documented in README.md.
atmosphere.auth.enabled=false
