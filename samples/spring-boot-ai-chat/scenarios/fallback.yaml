version: 1
name: fallback — same flow on chrome + firefox + webkit
tags: [fallback, chat-streaming, cross-browser]
steps:
  - spawn: { id: session, from: SAMPLE.md }
  - target:
      kind: web
      browsers: [chrome, firefox, webkit]
      url: "http://127.0.0.1:8080/atmosphere/console/"
  - wait_for: "[data-testid=status-label]:has-text('Connected')"
  - tap: "[data-testid=chat-input]"
  - type: "Hello — keep it short."
  - tap: "[data-testid=chat-send]"
  - wait_for: "[data-testid=message-bubble].message--assistant"
  - assert_visible: "[data-testid=message-bubble].message--assistant"
