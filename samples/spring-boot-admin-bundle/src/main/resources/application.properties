# atmosphere-admin-bundle minimal host.
# The only org.atmosphere.* dependency is atmosphere-admin-bundle (see pom.xml);
# every setting below tunes families the single bundle dependency wired in.

server.port=8100

# AI: boot without an LLM key in warn-not-throw mode (demo only).
# Set atmosphere.ai.fail-fast=true + an API key for production.
atmosphere.ai.fail-fast=false

# Durable sessions: the auto-config is opt-in; turn it on so the
# SessionStore + DurableSessionInterceptor beans materialize.
atmosphere.durable-sessions.enabled=true
