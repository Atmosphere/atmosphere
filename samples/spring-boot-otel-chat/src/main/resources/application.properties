server.port=8084
spring.application.name=atmosphere-otel-chat

# Atmosphere
atmosphere.packages=org.atmosphere.samples.springboot.otelchat

# WebTransport / HTTP/3 sidecar (Chromium-only; other browsers fall back to WS)
atmosphere.web-transport.enabled=true
atmosphere.web-transport.port=4449

# Actuator — expose all endpoints
management.endpoints.web.exposure.include=*

# OTel SDK auto-configuration via env vars:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
#   OTEL_SERVICE_NAME=atmosphere-otel-chat
# Defaults work with Jaeger's docker-compose in this directory.
