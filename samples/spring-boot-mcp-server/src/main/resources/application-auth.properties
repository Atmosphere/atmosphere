# MCP OAuth resource-server authorization — ACTIVE ONLY under the "auth" profile
# (run with: ./mvnw spring-boot:run -pl samples/spring-boot-mcp-server \
#   -Dspring-boot.run.profiles=auth). The sample's default posture is unchanged.
#
# These map to Atmosphere init-parameters consumed by McpAuthorization:
#  - resource / authorizationServers enable the RFC 9728 resource-server (PRM +
#    401 WWW-Authenticate challenge served at /.well-known/oauth-protected-resource)
#  - tokenValidator names the TokenValidator that authenticates Authorization:
#    Bearer tokens. Here it is the self-contained HMAC demo validator; for
#    production point this at a real OIDC validator (or use Spring Security
#    oauth2ResourceServer, whose servlet principal the MCP gate also honors).
atmosphere.init-params.org.atmosphere.mcp.auth.resource=http://localhost:8083/atmosphere/mcp
atmosphere.init-params.org.atmosphere.mcp.auth.authorizationServers=https://auth.example.com
atmosphere.init-params.org.atmosphere.mcp.auth.scopes=mcp:tools
atmosphere.init-params.org.atmosphere.auth.tokenValidator=org.atmosphere.samples.mcp.DemoHmacTokenValidator
