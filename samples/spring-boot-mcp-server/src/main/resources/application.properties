server.port=8083

# Tell Atmosphere to scan the MCP processor package and the sample package
atmosphere.packages=org.atmosphere.mcp.processor,org.atmosphere.samples.mcp

# WebTransport / HTTP/3 sidecar (Chromium-only; other browsers fall back to WS)
atmosphere.web-transport.enabled=true
atmosphere.web-transport.port=4448

# The bundled Atmosphere Console is the sample UI (/ redirects there).
atmosphere.console-subtitle=MCP server + multi-client broadcast chat
atmosphere.console-endpoint=/atmosphere/chat

# Harden the app's own routes (the framework already hardens
# /atmosphere/console/*). Adds X-Frame-Options/CSP frame-ancestors/nosniff/referrer.
atmosphere.security-headers.enabled=true
