server:
  port: 8081

atmosphere:
  # Tell the Spring Boot starter where the sample's @Agent classes live so
  # the CodingAgent endpoint registers. Without this the starter only scans
  # core org.atmosphere.* packages.
  packages: org.atmosphere.samples.springboot.codingagent

  ai:
    # The sample's @Prompt body drives a Docker Sandbox flow deterministically
    # and never calls an LLM, so the AgentRuntime selection does not matter
    # and no API key is required. fail-fast stays off so the sample boots
    # without keys; production apps should leave fail-fast on (the default).
    fail-fast: false

  # Stateful Interactions API in the Console "Interactions" tab — submit a
  # long-running coding task as a background interaction and poll its durable
  # steps[]. http-write-enabled + demo-principal are DEMO-ONLY (default-deny).
  interactions:
    http-write-enabled: true
    demo-principal: demo-user

  # DEMO-ONLY: open the console Workspace tab's read surfaces (plan, workspace
  # files) without a token. The default is deny — model-written file contents
  # are sensitive (Correctness Invariant #6); production deployments remove
  # this and authenticate with X-Atmosphere-Auth.
  admin:
    workspace-read-auth-required: false

spring:
  application:
    name: atmosphere-coding-agent
