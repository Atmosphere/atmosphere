server.port=8081

# Tell the Atmosphere Spring Boot starter where the sample's @Agent
# classes live so the CodingAgent endpoint actually registers.
atmosphere.packages=org.atmosphere.samples.springboot.codingagent

atmosphere.ai.runtime=spring-ai

# Keyless demo — the sample's @Prompt body doesn't require an LLM, so opt
# out of the starter's fail-fast default. Production apps should leave
# fail-fast on (the default).
atmosphere.ai.fail-fast=false

spring.application.name=atmosphere-coding-agent
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
