# Atmosphere AI Classroom - Configuration

atmosphere:
  packages: org.atmosphere.samples.springboot.aiclassroom
  # The bundled Atmosphere Console is the sample UI: the room picker selects
  # the per-room @AiEndpoint; every member of a room sees the same AI stream.
  console-subtitle: Collaborative AI classroom — every student sees the same stream
  console-endpoints: Math=/atmosphere/classroom/math,Code=/atmosphere/classroom/code,Science=/atmosphere/classroom/science
  web-transport:
    enabled: true
    port: 4446

# LLM Configuration (same as spring-boot-ai-chat)
llm:
  mode: ${LLM_MODE:remote}
  model: ${LLM_MODEL:gemini-2.5-flash}
  base-url: ${LLM_BASE_URL:}
  api-key: ${LLM_API_KEY:${GEMINI_API_KEY:}}

server:
  port: 8080
