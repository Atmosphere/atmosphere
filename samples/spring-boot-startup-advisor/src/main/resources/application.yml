atmosphere:
  packages: org.atmosphere.samples.springboot.multiagent

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.mcp.client.common.autoconfigure.McpClientAutoConfiguration
      - org.springframework.ai.mcp.client.common.autoconfigure.McpSseClientAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

llm:
  model: ${LLM_MODEL:gemini-2.5-flash}
  base-url: ${LLM_BASE_URL:}
  api-key: ${LLM_API_KEY:${GEMINI_API_KEY:}}

server:
  port: 8080
