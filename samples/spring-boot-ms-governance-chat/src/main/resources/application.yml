atmosphere:
  packages: org.atmosphere.samples.springboot.msgovernance
  # Built-in AI console auto-discovers the @AiEndpoint at
  # /atmosphere/ms-governance and reads this metadata at page load.
  console-subtitle: "Microsoft Agent Governance Toolkit — rules-over-context demo"
  console-endpoint: /atmosphere/ms-governance
  admin:
    enabled: true
    http-write-enabled: false
    require-principal: false
    # This sample's headline IS the governance decision chain in the built-in
    # console (Decisions tab), and the console carries no identity. That tab
    # reads /api/admin/governance/decisions, which is default-DENY under
    # Correctness Invariant #6 (it exposes request/response previews). Opt out
    # explicitly so the token-less demo renders the decisions it exists to show.
    content-read-auth-required: false

server:
  port: 8090
