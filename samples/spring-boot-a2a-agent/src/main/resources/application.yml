server:
  port: 8084

atmosphere:
  console-subtitle: A2A Agent — weather and time via Agent-to-Agent protocol
  # The bundled Atmosphere Console IS the sample UI: it drives the real A2A
  # wire (JSON-RPC message/stream over SSE, message/send fallback) through
  # its a2a transport adapter — not the Atmosphere WebSocket.
  console-endpoint: /atmosphere/a2a
  console-transport: a2a
  packages: org.atmosphere.samples.springboot.a2a

llm:
  mode: ${LLM_MODE:remote}
  model: ${LLM_MODEL:gemini-2.5-flash}
  base-url: ${LLM_BASE_URL:}
  api-key: ${LLM_API_KEY:${GEMINI_API_KEY:}}

logging:
  level:
    org.atmosphere: DEBUG
