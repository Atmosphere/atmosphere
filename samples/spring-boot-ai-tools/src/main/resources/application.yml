# Atmosphere @AiTool Pipeline Sample
# Framework-agnostic tools that work with any AI backend

atmosphere:
  packages: org.atmosphere.samples.springboot.aitools

llm:
  mode: ${LLM_MODE:remote}
  model: ${LLM_MODEL:gemini-2.5-flash}
