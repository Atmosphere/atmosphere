version: 1
name: stream — chrome opens AI chat console on Quarkus :18810
tags: [stream, chat-streaming, quarkus-ai, must-pass]
steps:
  - spawn: { id: session, from: SAMPLE.md }
  - target:
      kind: web
      browsers: [chrome]
      url: "http://127.0.0.1:18810/atmosphere/console/"
  - wait_for: "[data-testid=status-label]:has-text('Connected')"
  - tap: "[data-testid=chat-input]"
  - type: "hello from mirroir-run on quarkus-ai"
  - tap: "[data-testid=chat-send]"
  - wait_for: "[data-testid=message-bubble].message--user"
  - assert_visible: "[data-testid=message-bubble].message--user"
