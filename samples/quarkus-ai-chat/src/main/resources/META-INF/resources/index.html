<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atmosphere Quarkus AI Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: #0f1117; color: #e4e5e7; padding: 24px; max-width: 720px; margin: 0 auto; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .status { font-size: 13px; color: #8b8d92; margin-bottom: 16px; }
    .status[data-state="Connected"] { color: #4ade80; }
    .status[data-state="Disconnected"] { color: #f87171; }
    #log { background: #1a1d24; border-radius: 8px; padding: 16px; min-height: 200px; max-height: 360px; overflow-y: auto; font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.5; white-space: pre-wrap; margin-bottom: 12px; }
    #log .user { color: #60a5fa; }
    #log .assistant { color: #e4e5e7; }
    .controls { display: flex; gap: 8px; }
    textarea { flex: 1; background: #1a1d24; color: #e4e5e7; border: 1px solid #30343d; border-radius: 6px; padding: 8px 12px; font-size: 14px; resize: none; }
    button { background: #3b82f6; color: white; border: 0; border-radius: 6px; padding: 0 16px; font-size: 14px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Atmosphere Quarkus AI Chat — LangChain4j bridge</h1>
  <div class="status" id="status" data-state="Disconnected">Connecting…</div>
  <div id="log" data-testid="chat-log"></div>
  <div class="controls">
    <textarea id="input" rows="2" placeholder="Type a message…" data-testid="chat-input"></textarea>
    <button id="send" disabled data-testid="chat-send">Send</button>
  </div>

  <script type="module">
    import { atmosphere } from 'https://cdn.jsdelivr.net/npm/atmosphere.js@5/+esm';

    const logEl = document.getElementById('log');
    const inputEl = document.getElementById('input');
    const sendEl = document.getElementById('send');
    const statusEl = document.getElementById('status');
    let subscription = null;
    let assistantBuffer = '';
    let assistantNode = null;

    function setStatus(state) {
      statusEl.textContent = state;
      statusEl.dataset.state = state;
      sendEl.disabled = state !== 'Connected';
    }

    function appendLine(role, text) {
      const el = document.createElement('div');
      el.className = role;
      el.textContent = (role === 'user' ? '> ' : '< ') + text;
      logEl.appendChild(el);
      logEl.scrollTop = logEl.scrollHeight;
      return el;
    }

    function startAssistant() {
      assistantBuffer = '';
      assistantNode = appendLine('assistant', '');
    }

    function appendAssistant(chunk) {
      assistantBuffer += chunk;
      if (assistantNode) {
        assistantNode.textContent = '< ' + assistantBuffer;
        logEl.scrollTop = logEl.scrollHeight;
      }
    }

    const request = {
      url: '/atmosphere/ai-chat',
      contentType: 'text/plain',
      transport: 'websocket',
      fallbackTransport: 'long-polling',
      trackMessageLength: true,
      reconnectInterval: 1500,
    };

    const handlers = {
      open: () => setStatus('Connected'),
      reopen: () => setStatus('Connected'),
      close: () => setStatus('Disconnected'),
      error: () => setStatus('Disconnected'),
      message: (response) => {
        const raw = typeof response.responseBody === 'string'
          ? response.responseBody.trim()
          : '';
        if (!raw) return;
        try {
          const json = JSON.parse(raw);
          // Atmosphere AI envelope: {type, data, sessionId, seq}
          // type ∈ {progress, streaming-text, metadata, complete, error}
          switch (json.type) {
            case 'streaming-text':
              if (!assistantNode) startAssistant();
              appendAssistant(json.data);
              break;
            case 'complete':
              assistantNode = null;
              break;
            case 'error':
              if (!assistantNode) startAssistant();
              appendAssistant('[error: ' + (json.data || 'unknown') + ']');
              assistantNode = null;
              break;
            // progress / metadata are silent for this minimal UI
          }
        } catch (e) {
          if (!assistantNode) startAssistant();
          appendAssistant(raw);
        }
      },
    };

    subscription = await atmosphere.subscribe(request, handlers);

    sendEl.addEventListener('click', () => {
      const msg = inputEl.value.trim();
      if (!msg || !subscription) return;
      appendLine('user', msg);
      startAssistant();
      subscription.push(msg);
      inputEl.value = '';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendEl.click();
      }
    });
  </script>
</body>
</html>
