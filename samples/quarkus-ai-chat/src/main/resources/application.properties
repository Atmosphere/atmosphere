# Match the e2e sample-server fixture (modules/integration-tests/e2e/fixtures/sample-server.ts)
# and the README's documented port. Quarkus default is 8080 which collides with
# spring-boot-ai-chat — use a distinct port so both can run side-by-side.
quarkus.http.port=18810

# Atmosphere scans this package for annotation-driven handlers (@AiEndpoint,
# @ManagedService, etc.).
quarkus.atmosphere.packages=org.atmosphere.samples.quarkus.aichat

# Quarkus LangChain4j config — the atmosphere-quarkus-langchain4j extension
# pulls the StreamingChatModel bean produced from these properties on app
# startup and hands it to LangChain4jAgentRuntime.setModel(...).
#
# Defaults target Gemini's OpenAI-compatible endpoint to match the rest of
# the AI samples; override for OpenAI proper / Ollama / etc. Set the
# OPENAI_API_KEY env var (or LLM_API_KEY which the Quarkus L4j ext also reads).
quarkus.langchain4j.openai.api-key=${LLM_API_KEY:${GEMINI_API_KEY:dummy}}
quarkus.langchain4j.openai.base-url=${LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}
quarkus.langchain4j.openai.chat-model.model-name=${LLM_MODEL:gemini-2.5-flash-lite}
# Gemini's OpenAI-compatible endpoint rejects unknown OpenAI fields. Quarkus L4j
# always sends frequency_penalty / presence_penalty (no Optional, default 0),
# which Gemini surfaces as "Invalid JSON payload received. Unknown name ...".
# GeminiCompatCustomizer (a CDI ModelBuilderCustomizer<OpenAiStreamingChatModelBuilder>)
# nulls those fields out on the builder right before build(); for OpenAI proper
# delete that class and these comments are moot.

# Bridge llm.* into the Atmosphere AiConfig view too — AiEndpointProcessor
# reads these to decide whether to fall back to the demo provider.
llm.api-key=${LLM_API_KEY:${GEMINI_API_KEY:dummy}}
llm.base-url=${LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}
llm.model=${LLM_MODEL:gemini-2.5-flash}

quarkus.langchain4j.openai.chat-model.log-requests=true
# log-responses=true dumps the full collected SSE body to the log on every
# call, which gets noisy fast. Off by default; flip on for upstream debug.
quarkus.langchain4j.openai.chat-model.log-responses=false

quarkus.log.category."org.atmosphere".level=INFO
quarkus.log.category."org.atmosphere.ai.quarkus.langchain4j".level=DEBUG
quarkus.log.category."dev.langchain4j".level=DEBUG
quarkus.log.category."io.quarkiverse.langchain4j".level=DEBUG

# Admin console — read-only by default, no auth required for read endpoints.
atmosphere.admin.http-write-enabled=false

# Atmosphere gRPC transport (atmosphere-quarkus-grpc). Opens a standalone
# Netty gRPC server alongside the Undertow HTTP/WebSocket port so a gRPC
# client can subscribe to the same Broadcaster topics that WebSocket clients
# use. Port 19090 keeps the sample side-by-side with spring-boot-ai-chat
# (which uses 9090) and the e2e fixture's WebSocket port (18810).
quarkus.atmosphere.grpc.enabled=true
quarkus.atmosphere.grpc.port=19090
quarkus.atmosphere.grpc.enable-reflection=true

# Cache (Spring Boot parity for AtmosphereCacheAutoConfiguration). When
# enabled the deployment processor wires BoundedMemoryCache as the default
# broadcaster cache and installs MessageAckInterceptor so PromptCacheDemoChat
# can hit the framework cache gate without each handler instantiating its
# own InMemoryResponseCache.
quarkus.atmosphere.cache-enabled=true

# Health (Spring Boot parity for AtmosphereActuatorAutoConfiguration).
# Quarkus exposes the SmallRye Health endpoints at /q/health, /q/health/live,
# and /q/health/ready. AtmosphereHealthCheck is auto-registered via the
# deployment @BuildStep when quarkus-smallrye-health is on the classpath.
quarkus.smallrye-health.root-path=/q/health

# Micrometer metrics (Spring Boot parity for AtmosphereMetricsAutoConfiguration).
# AtmosphereMetricsProducer is auto-registered via the deployment @BuildStep
# when quarkus-micrometer is on the classpath. Prometheus exposition lives at
# /q/metrics. AtmosphereGovernanceMetricsProducer stacks on top of this so
# the @AgentScope guardrail's policy evaluations show up under
# atmosphere.governance.* alongside the rest of the Atmosphere meters.
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# OpenTelemetry tracing (Spring Boot parity for AtmosphereTracingAutoConfiguration).
# AtmosphereTracingProducer is auto-registered when quarkus-opentelemetry is on
# the classpath. Default the OTLP exporter to none so the demo doesn't spam
# connection-refused logs against the default localhost:4317 collector; flip
# OTEL_TRACES_EXPORTER=otlp + OTEL_EXPORTER_OTLP_ENDPOINT=... to wire a real
# backend.
quarkus.otel.exporter.otlp.traces.protocol=http/protobuf
quarkus.otel.traces.exporter=${OTEL_TRACES_EXPORTER:none}
quarkus.otel.metrics.exporter=${OTEL_METRICS_EXPORTER:none}
quarkus.otel.logs.exporter=${OTEL_LOGS_EXPORTER:none}
