# Atmosphere scans this package for annotation-driven handlers (@AiEndpoint,
# @ManagedService, etc.).
quarkus.atmosphere.packages=org.atmosphere.samples.quarkus.aichat

# Quarkus LangChain4j config — the atmosphere-quarkus-langchain4j extension
# pulls the StreamingChatModel bean produced from these properties on app
# startup and hands it to LangChain4jAgentRuntime.setModel(...).
#
# Defaults target Gemini's OpenAI-compatible endpoint to match the rest of
# the AI samples; override for OpenAI proper / Ollama / etc. Set the
# OPENAI_API_KEY env var (or LLM_API_KEY which the Quarkus L4j ext also reads).
quarkus.langchain4j.openai.api-key=${LLM_API_KEY:${GEMINI_API_KEY:dummy}}
quarkus.langchain4j.openai.base-url=${LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}
quarkus.langchain4j.openai.chat-model.model-name=${LLM_MODEL:gemini-2.5-flash-lite}
# Gemini's OpenAI-compatible endpoint rejects unknown OpenAI fields. Quarkus L4j
# always sends frequency_penalty / presence_penalty (no Optional, default 0),
# which Gemini surfaces as "Invalid JSON payload received. Unknown name ...".
# GeminiCompatCustomizer (a CDI ModelBuilderCustomizer<OpenAiStreamingChatModelBuilder>)
# nulls those fields out on the builder right before build(); for OpenAI proper
# delete that class and these comments are moot.

# Bridge llm.* into the Atmosphere AiConfig view too — AiEndpointProcessor
# reads these to decide whether to fall back to the demo provider.
llm.api-key=${LLM_API_KEY:${GEMINI_API_KEY:dummy}}
llm.base-url=${LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}
llm.model=${LLM_MODEL:gemini-2.5-flash}

quarkus.langchain4j.openai.chat-model.log-requests=true
# log-responses=true dumps the full collected SSE body to the log on every
# call, which gets noisy fast. Off by default; flip on for upstream debug.
quarkus.langchain4j.openai.chat-model.log-responses=false

quarkus.log.category."org.atmosphere".level=INFO
quarkus.log.category."org.atmosphere.ai.quarkus.langchain4j".level=DEBUG
quarkus.log.category."dev.langchain4j".level=DEBUG
quarkus.log.category."io.quarkiverse.langchain4j".level=DEBUG

# Admin console — read-only by default, no auth required for read endpoints.
atmosphere.admin.http-write-enabled=false
