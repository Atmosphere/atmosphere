atmosphere:
  packages: org.atmosphere.samples.springboot.a2astartup
  web-transport:
    enabled: true
    port: 4446
  # Embabel config (only active when atmosphere-embabel is on the classpath):
  embabel:
    agent-name: ceo

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  # Spring AI config (uncomment when using atmosphere-spring-ai runtime):
  # ai:
  #   openai:
  #     api-key: ${LLM_API_KEY:${GEMINI_API_KEY:}}
  #     base-url: ${LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
  #     chat:
  #       options:
  #         model: ${LLM_MODEL:gemini-2.5-flash}

llm:
  model: ${LLM_MODEL:gemini-2.5-flash}
  base-url: ${LLM_BASE_URL:}
  api-key: ${LLM_API_KEY:${GEMINI_API_KEY:}}

embabel:
  models:
    default-llm: gemini-2.5-flash
  agent:
    platform:
      scanning:
        bean: true

server:
  port: ${SERVER_PORT:8080}
