# Atmosphere Koog Chat - Configuration
# Uses JetBrains Koog as the AI runtime via the AgentRuntime SPI.

atmosphere:
  console-subtitle: Real-time AI chat powered by JetBrains Koog
  packages: org.atmosphere.samples.springboot.koogchat
  koog:
    model: ${LLM_MODEL:gemini-2.5-flash}
    api-key: ${LLM_API_KEY:${GEMINI_API_KEY:${OPENAI_API_KEY:}}}

# LLM config (used by AiConfig for demo-mode detection)
llm:
  mode: ${LLM_MODE:remote}
  model: ${LLM_MODEL:gemini-2.5-flash}
  base-url: ${LLM_BASE_URL:}
  api-key: ${LLM_API_KEY:${GEMINI_API_KEY:}}

server:
  port: 8097
