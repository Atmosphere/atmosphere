<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MCP Apps Sandbox Proxy</title>
  <style>html,body{margin:0;height:100%;border:0;background:transparent}
    iframe{width:100%;height:100%;border:0;display:block}</style>
</head>
<body>
<!--
  MCP Apps sandbox proxy (SEP-1865, "Sandbox proxy").

  The console host loads THIS document in an iframe at a DIFFERENT origin from
  itself. Per the spec the proxy iframe runs with `allow-scripts allow-same-origin`
  so it can script within its own (distinct) origin — that origin is isolated
  from the host, so a same-origin grant here cannot reach the host's DOM. The
  untrusted MCP App HTML is then rendered in a NESTED iframe that this proxy
  creates with `allow-scripts` only (no allow-same-origin → opaque origin) plus
  a CSP, so the app is doubly contained.

  Protocol:
    1. On load → notify the host `ui/notifications/sandbox-proxy-ready`.
    2. Host → proxy `ui/notifications/sandbox-resource-ready` {html, csp, ...}.
    3. Proxy renders the inner View iframe with the HTML + a derived CSP.
    4. Proxy relays every other message host<->view, EXCEPT `ui/...sandbox-*`.
  The proxy itself never originates requests (no synthesized ids).
-->
<script>
(function () {
  'use strict';
  var host = window.parent;
  if (!host || host === window) { return; }

  var view = null; // the inner View iframe element

  function postToHost(message) { host.postMessage(message, '*'); }

  // Build a CSP string from the resource's declared domains, with restrictive
  // defaults. Inline script/style are allowed because MCP App HTML is inline by
  // nature — the sandboxed opaque origin (not CSP) is the isolation boundary;
  // CSP here restricts network, navigation, framing, and base-uri.
  function buildCsp(csp) {
    csp = csp || {};
    var connect = (csp.connectDomains || []);
    var resource = (csp.resourceDomains || []);
    var frame = (csp.frameDomains || []);
    var base = (csp.baseUriDomains || []);
    function join(list) { return list.join(' '); }
    var directives = [
      "default-src 'none'",
      "script-src 'unsafe-inline' " + join(resource),
      "style-src 'unsafe-inline' " + join(resource),
      "img-src 'self' data: " + join(resource),
      "font-src 'self' data: " + join(resource),
      "media-src 'self' data: " + join(resource),
      "connect-src " + (connect.length ? join(connect) : "'none'"),
      "frame-src " + (frame.length ? join(frame) : "'none'"),
      "base-uri " + (base.length ? join(base) : "'self'")
    ];
    return directives.map(function (d) { return d.trim(); }).join('; ');
  }

  // Insert the CSP <meta> as the first thing the inner document parses, so it
  // governs every subsequent element. Falls back gracefully if there is no head.
  function withCsp(rawHtml, csp) {
    var meta = '<meta http-equiv="Content-Security-Policy" content="' +
      buildCsp(csp).replace(/"/g, '&quot;') + '">';
    var lower = rawHtml.toLowerCase();
    var headIdx = lower.indexOf('<head>');
    if (headIdx !== -1) {
      var at = headIdx + '<head>'.length;
      return rawHtml.slice(0, at) + meta + rawHtml.slice(at);
    }
    var htmlIdx = lower.indexOf('<html');
    if (htmlIdx !== -1) {
      var close = lower.indexOf('>', htmlIdx);
      if (close !== -1) {
        return rawHtml.slice(0, close + 1) + '<head>' + meta + '</head>' + rawHtml.slice(close + 1);
      }
    }
    return meta + rawHtml;
  }

  // Map declared permissions to the inner iframe `allow` attribute.
  function buildAllow(permissions) {
    if (!permissions) { return ''; }
    var allow = [];
    if (permissions.camera) { allow.push('camera'); }
    if (permissions.microphone) { allow.push('microphone'); }
    if (permissions.geolocation) { allow.push('geolocation'); }
    if (permissions.clipboardWrite) { allow.push('clipboard-write'); }
    return allow.join('; ');
  }

  function renderView(params) {
    if (view) { view.remove(); view = null; }
    view = document.createElement('iframe');
    // Inner View: opaque origin (allow-scripts, NO allow-same-origin) unless the
    // host explicitly overrides the sandbox attribute.
    view.setAttribute('sandbox', params.sandbox || 'allow-scripts');
    var allow = buildAllow(params.permissions);
    if (allow) { view.setAttribute('allow', allow); }
    view.setAttribute('title', 'MCP App');
    view.srcdoc = withCsp(String(params.html || ''), params.csp);
    document.body.appendChild(view);
  }

  window.addEventListener('message', function (event) {
    var d = event.data;
    if (!d || d.jsonrpc !== '2.0') { return; }

    // From the host (parent): consume sandbox-* control messages; relay the rest
    // to the inner View. The host never sends to the View before `initialized`.
    if (event.source === host) {
      if (d.method === 'ui/notifications/sandbox-resource-ready') {
        renderView(d.params || {});
        return;
      }
      if (typeof d.method === 'string' && d.method.indexOf('ui/notifications/sandbox-') === 0) {
        return; // other reserved sandbox-* control messages: not forwarded
      }
      if (view && view.contentWindow) { view.contentWindow.postMessage(d, '*'); }
      return;
    }

    // From the inner View: relay to the host, except reserved sandbox-* messages.
    if (view && event.source === view.contentWindow) {
      if (typeof d.method === 'string' && d.method.indexOf('ui/notifications/sandbox-') === 0) {
        return;
      }
      postToHost(d);
    }
  });

  // Announce readiness once this proxy document is live.
  postToHost({ jsonrpc: '2.0', method: 'ui/notifications/sandbox-proxy-ready', params: {} });
})();
</script>
</body>
</html>
